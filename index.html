<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Retro NES-style arcade fighting game with pixel art characters and physics-based combat.">
  <title>HOPE Brawlers — Retro Fighter</title>
  <style>
    /* ========================================================
       GLOBAL RESET & NES AESTHETIC
       ======================================================== */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #87CEEB;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      user-select: none;
    }

    #gameWrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    canvas {
      display: block;
      width: 100%; height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }

    /* Scanline overlay for CRT feel */
    #scanlines {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 10;
    }

    /* CRT vignette */
    #vignette {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
      z-index: 11;
    }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="768" height="480"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
  </div>

  <script>
    /* ===========================================================
       PIXEL BRAWL — RETRO NES FIGHTING GAME
       Complete single-file arcade fighter
       =========================================================== */

    // ── Canvas Setup ──────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let W = window.innerWidth;
    let H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    ctx.imageSmoothingEnabled = false;

    window.addEventListener('resize', () => {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      GROUND_Y = H - 80; // Re-adjust ground level
      ctx.imageSmoothingEnabled = false;
    });

    // ── Asset Preloading & Processing ──────────────────────────
    const ASSETS = {
      BG: 'assets/medieval_city_bg.png',
      TITLE_BG: 'assets/title_bg.png'
    };
    
    // Automatically register all dynamic animation frames for the 4 characters
    const CHAR_NAMES = ['Pranav', 'Omkar', 'Eswar', 'Haran'];
    CHAR_NAMES.forEach(name => {
      const up = name.toUpperCase();
      ASSETS[up] = `assets/${name}.png`; // Idle pose base image
      
      // Explicitly matching the exact file counts from the repository structure
      for (let i = 1; i <= 4; i++) ASSETS[`${up}_WALK_${i}`] = `assets/${name}/walk_0${i}.png`;
      for (let i = 1; i <= 3; i++) ASSETS[`${up}_PUNCH_${i}`] = `assets/${name}/lightPunch_0${i}.png`;
      for (let i = 1; i <= 3; i++) ASSETS[`${up}_KICK_${i}`] = `assets/${name}/heavyKick_0${i}.png`; // Reduced to 3 frames
      for (let i = 1; i <= 3; i++) ASSETS[`${up}_JUMP_${i}`] = `assets/${name}/jump_0${i}.png`;
      for (let i = 1; i <= 3; i++) ASSETS[`${up}_CHARGE_${i}`] = `assets/${name}/charge_0${i}.png`;
      for (let i = 1; i <= 4; i++) ASSETS[`${up}_SPECIAL_${i}`] = `assets/${name}/special_0${i}.png`;
      
      ASSETS[`${up}_HIT_1`] = `assets/${name}/hit_01.png`;
      ASSETS[`${up}_KO_1`] = `assets/${name}/ko_01.png`;
    });
    
    const processedSprites = {};
    let totalAssetsCount = Object.keys(ASSETS).length;
    let loadedAssetsCount = 0;
    let gameReady = false; // Engine block until loading finishes

    function loadAndProcessImage(name, url) {
      const img = new Image();
      
      img.onload = () => {
        if (name === 'BG' || name === 'TITLE_BG') {
           processedSprites[name] = img;
           trackAssetLoading();
           return;
        }
        
        try {
          const off = document.createElement('canvas');
          off.width = img.width || 100;
          off.height = img.height || 240;
          const octx = off.getContext('2d');
          octx.drawImage(img, 0, 0);
          
          // Remove white/light background
          const imgData = octx.getImageData(0, 0, off.width, off.height);
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            // If close to white, make transparent
            if (r > 240 && g > 240 && b > 240) {
              data[i+3] = 0;
            }
          }
          octx.putImageData(imgData, 0, 0);
          processedSprites[name] = off;
        } catch (e) {
          // Graceful fallback if CORS security blocks getImageData
          console.warn(`Local CORS protection warning for ${name}. Using raw image asset.`);
          processedSprites[name] = img;
        }
        
        trackAssetLoading();
      };
      
      img.onerror = () => {
        console.error(`404 Asset Missing on Server: ${url}`);
        trackAssetLoading(); // Proceed anyway so game isn't soft-locked
      };
      
      img.src = url;
    }

    function trackAssetLoading() {
      loadedAssetsCount++;
      if (loadedAssetsCount >= totalAssetsCount) {
        gameReady = true;
      }
    }

    // Trigger sequential loading
    Object.keys(ASSETS).forEach(key => {
      loadAndProcessImage(key, ASSETS[key]);
    });

    // ── Constants ─────────────────────────────────────────────
    const GRAVITY      = 0.55;
    let GROUND_Y       = H - 80;     // floor line dynamically based on H
    const FRICTION     = 0.82;
    const MAX_HEALTH   = 200;
    const MAX_MANA     = 100;
    const ROUND_WIN    = 2;          // rounds to win a match
    const AI_REACT_MS  = 120;        // AI reaction delay (faster)

    // ── Game States ───────────────────────────────────────────
    const STATE = {
      TITLE:     'title',
      SELECT:    'select',
      FIGHT:     'fight',
      ROUND_END: 'round_end',
      MATCH_END: 'match_end'
    };

    // ── NES Color Palette ─────────────────────────────────────
    const PAL = {
      bg:         '#0f0f23',
      bg2:        '#1a1a2e',
      white:      '#fcfcfc',
      red:        '#e44040',
      darkRed:    '#8b1a1a',
      blue:       '#4488ff',
      darkBlue:   '#2244aa',
      green:      '#44cc44',
      darkGreen:  '#228822',
      yellow:     '#f0d040',
      orange:     '#e88020',
      purple:     '#aa44ee',
      darkPurple: '#6622aa',
      violet:     '#9944ff',
      darkViolet: '#5522bb',
      cyan:       '#44dddd',
      pink:       '#ee66aa',
      skin:       '#f0b888',
      skinDark:   '#c08050',
      gray:       '#888888',
      darkGray:   '#444444',
      black:      '#111111'
    };

    // ── Sound Engine (Web Audio API) ──────────────────────────
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
    }

    /** Play a retro synthesized sound effect */
    function playSFX(type, element) {
      ensureAudio();
      const now = audioCtx.currentTime;

      if (type === 'punch') {
        const bufSize = audioCtx.sampleRate * 0.08;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 800;
        filter.Q.value = 1.5;
        src.connect(filter).connect(gain).connect(audioCtx.destination);
        src.start(now);
      }
      else if (type === 'kick') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.2);
        const bufSize = audioCtx.sampleRate * 0.06;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 4);
        }
        const nSrc = audioCtx.createBufferSource();
        nSrc.buffer = buf;
        const nGain = audioCtx.createGain();
        nGain.gain.setValueAtTime(0.18, now);
        nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        nSrc.connect(nGain).connect(audioCtx.destination);
        nSrc.start(now);
      }
      else if (type === 'special') {
        if (element === 'lightning') {
          for (let j = 0; j < 3; j++) {
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            const t = now + j * 0.06;
            osc.frequency.setValueAtTime(1200 + j * 400, t);
            osc.frequency.exponentialRampToValueAtTime(200, t + 0.08);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.connect(g).connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.12);
          }
          const bufSize = audioCtx.sampleRate * 0.2;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2) * (Math.random() > 0.5 ? 1 : 0);
          }
          const nSrc = audioCtx.createBufferSource();
          nSrc.buffer = buf;
          const nG = audioCtx.createGain();
          nG.gain.setValueAtTime(0.12, now);
          nG.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          nSrc.connect(nG).connect(audioCtx.destination);
          nSrc.start(now);
        }
        else if (element === 'water') {
          const bufSize = audioCtx.sampleRate * 0.4;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (0.5 + 0.5 * Math.sin(i / bufSize * Math.PI));
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(300, now);
          filter.frequency.linearRampToValueAtTime(1200, now + 0.15);
          filter.frequency.linearRampToValueAtTime(400, now + 0.4);
          filter.Q.value = 3;
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.22, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          src.connect(filter).connect(g).connect(audioCtx.destination);
          src.start(now);
        }
        else if (element === 'fire') {
          const osc1 = audioCtx.createOscillator();
          osc1.type = 'sawtooth';
          osc1.frequency.setValueAtTime(100, now);
          osc1.frequency.exponentialRampToValueAtTime(600, now + 0.12);
          osc1.frequency.exponentialRampToValueAtTime(80, now + 0.35);
          const g1 = audioCtx.createGain();
          g1.gain.setValueAtTime(0.2, now);
          g1.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc1.connect(g1).connect(audioCtx.destination);
          osc1.start(now);
          osc1.stop(now + 0.4);
          const bufSize = audioCtx.sampleRate * 0.25;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.5) * (Math.random() > 0.3 ? 1 : 0);
          }
          const nSrc = audioCtx.createBufferSource();
          nSrc.buffer = buf;
          const nG = audioCtx.createGain();
          nG.gain.setValueAtTime(0.15, now);
          nG.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          const hpf = audioCtx.createBiquadFilter();
          hpf.type = 'highpass';
          hpf.frequency.value = 500;
          nSrc.connect(hpf).connect(nG).connect(audioCtx.destination);
          nSrc.start(now);
        }
        else if (element === 'earth') {
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(60, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.35, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          osc.connect(g).connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.45);
          const osc2 = audioCtx.createOscillator();
          osc2.type = 'square';
          osc2.frequency.setValueAtTime(90, now);
          osc2.frequency.exponentialRampToValueAtTime(25, now + 0.25);
          const g2 = audioCtx.createGain();
          g2.gain.setValueAtTime(0.12, now + 0.05);
          g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc2.connect(g2).connect(audioCtx.destination);
          osc2.start(now);
          osc2.stop(now + 0.4);
          const bufSize = audioCtx.sampleRate * 0.2;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
          }
          const nSrc = audioCtx.createBufferSource();
          nSrc.buffer = buf;
          const nG = audioCtx.createGain();
          nG.gain.setValueAtTime(0.1, now);
          nG.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          const lpf = audioCtx.createBiquadFilter();
          lpf.type = 'lowpass';
          lpf.frequency.value = 400;
          nSrc.connect(lpf).connect(nG).connect(audioCtx.destination);
          nSrc.start(now);
        }
      }
      else if (type === 'hit') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.06);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.1);
      }
      else if (type === 'ko') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.6);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.65);
      }
    }

    // ── Character Definitions ─────────────────────────────────
    const CHAR_DEFS = [
      {
        name: 'HARAN',
        title: 'Earth Warden',
        colors: { primary: PAL.green, secondary: PAL.darkGreen, accent: PAL.yellow },
        stats: { speed: 2.8, power: 1.3, defense: 1.1, jumpForce: -15 },
        special: { name: 'QUAKE SLAM', color: '#8B6914', damage: 22, range: 90, frames: 30, element: 'earth' },
        desc: 'Balanced brawler who commands the earth itself.'
      },
      {
        name: 'OMKAR',
        title: 'Flame Berserker',
        colors: { primary: PAL.red, secondary: PAL.darkRed, accent: PAL.orange },
        stats: { speed: 3.5, power: 1.0, defense: 0.8, jumpForce: -16.5 },
        special: { name: 'INFERNO RUSH', color: PAL.orange, damage: 18, range: 130, frames: 24, element: 'fire' },
        desc: 'Fastest fighter — his fists burn with fury.'
      },
      {
        name: 'PRANAV',
        title: 'Thunder Lord',
        colors: { primary: PAL.violet, secondary: PAL.darkViolet, accent: '#E0B0FF' },
        stats: { speed: 2.2, power: 1.1, defense: 1.5, jumpForce: -14.5 },
        special: { name: 'THUNDER BOLT', color: '#8A2BE2', damage: 20, range: 70, frames: 35, element: 'lightning' },
        desc: 'Tanky defender who wields the storm.'
      },
      {
        name: 'ESWAR',
        title: 'Tidal Striker',
        colors: { primary: PAL.blue, secondary: PAL.darkBlue, accent: PAL.cyan },
        stats: { speed: 3.0, power: 1.5, defense: 0.9, jumpForce: -15.5 },
        special: { name: 'TIDAL WAVE', color: '#66ccff', damage: 25, range: 100, frames: 28, element: 'water' },
        desc: 'Raw power — rides the crushing wave.'
      }
    ];

    // ── Attack Definitions ────────────────────────────────────
    const ATTACKS = {
      lightPunch:  { damage: 6,  range: 40,  startup: 3,  active: 4,  recovery: 6,  knockback: 3,   hitstun: 10, type: 'light' },
      heavyKick:   { damage: 14, range: 55,  startup: 6,  active: 5,  recovery: 12, knockback: 8,   hitstun: 18, type: 'heavy' },
      special:     { damage: 0,  range: 0,   startup: 8,  active: 8,  recovery: 16, knockback: 12,  hitstun: 24, type: 'special' }
    };

    // ── Input Manager ─────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    window.addEventListener('keyup',   e => { keys[e.code] = false; e.preventDefault(); });

    let mouseX = 0, mouseY = 0, mouseClicked = false;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      mouseX = (e.clientX - rect.left) * scaleX;
      mouseY = (e.clientY - rect.top)  * scaleY;
    });
    canvas.addEventListener('click', () => { mouseClicked = true; });

    // ── Utility Helpers ───────────────────────────────────────
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function rand(a, b) { return Math.random() * (b - a) + a; }
    function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // ── Pixel Drawing Helpers ─────────────────────────────────
    function pxRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }
    function pxText(text, x, y, size, color, align = 'left') {
      ctx.fillStyle = color;
      ctx.font = `${size}px 'Press Start 2P', monospace`;
      ctx.textAlign = align;
      ctx.textBaseline = 'top';
      ctx.fillText(text, Math.round(x), Math.round(y));
    }

    // ── Screen Shake System ───────────────────────────────────
    let shakeIntensity = 0;
    let shakeDuration  = 0;
    let shakeOffsetX   = 0;
    let shakeOffsetY   = 0;

    function triggerShake(intensity, duration) {
      shakeIntensity = intensity;
      shakeDuration  = duration;
    }

    function updateShake() {
      if (shakeDuration > 0) {
        shakeOffsetX = rand(-shakeIntensity, shakeIntensity);
        shakeOffsetY = rand(-shakeIntensity, shakeIntensity);
        shakeDuration--;
        shakeIntensity *= 0.92;
      } else {
        shakeOffsetX = 0;
        shakeOffsetY = 0;
      }
    }

    // ── Particle System ───────────────────────────────────────
    class Particle {
      constructor(x, y, vx, vy, color, life, size) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.life = life; this.maxLife = life;
        this.size = size;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.vx *= 0.98;
        this.life--;
      }
      draw() {
        const alpha = clamp(this.life / this.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        pxRect(this.x, this.y, this.size, this.size, this.color);
        ctx.globalAlpha = 1;
      }
      get dead() { return this.life <= 0; }
    }

    let particles = [];

    function spawnHitSparks(x, y, color, count = 12) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(
          x + rand(-4, 4), y + rand(-4, 4),
          rand(-4, 4), rand(-5, 1),
          color,
          randInt(8, 20),
          randInt(2, 5)
        ));
      }
    }

    function spawnSpecialFX(x, y, color, count = 25) {
      for (let i = 0; i < count; i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(2, 7);
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed, Math.sin(angle) * speed,
          color,
          randInt(15, 35),
          randInt(3, 6)
        ));
      }
    }

    // ── Pixel-Art Character Renderer ──────────────────────────
    function drawCharacter(x, y, name, facing, pose, frame) {
      ctx.save();
      ctx.translate(Math.round(x), Math.round(y));

      let startY = 0;
      if (pose === 'walk1') startY -= 3;
      if (pose === 'walk2') startY += 3;

      let scaleX = facing;
      let scaleY = 1;
      let rotation = 0;

      if (pose === 'hit' || pose === 'ko') {
         rotation = -0.2; // tilt back
      }

      ctx.translate(0, startY);
      ctx.scale(scaleX, scaleY);
      ctx.rotate(rotation);

      let img = processedSprites[name];
      let isWalkFrame = false, isPunchFrame = false, isKickFrame = false;
      let isJumpFrame = false, isChargeFrame = false, isSpecialFrame = false;
      let isHitFrame = false, isKoFrame = false;
      
      if (pose === 'walk1' || pose === 'walk2' || pose === 'walking') {
          const walkFrame = (Math.floor(frame / 6) % 4) + 1; // 1, 2, 3, or 4
          const walkImg = processedSprites[name + '_WALK_' + walkFrame];
          if (walkImg) { img = walkImg; isWalkFrame = true; }
      } else if (pose === 'lightPunch') {
          const punchFrame = Math.min(3, Math.floor(frame / 4) + 1); // 1, 2, 3
          const punchImg = processedSprites[name + '_PUNCH_' + punchFrame];
          if (punchImg) { img = punchImg; isPunchFrame = true; }
      } else if (pose === 'heavyKick') {
          const kickFrame = Math.min(3, Math.floor(frame / 6) + 1); // 1, 2, 3
          const kickImg = processedSprites[name + '_KICK_' + kickFrame];
          if (kickImg) { img = kickImg; isKickFrame = true; }
      } else if (pose === 'jump') {
          const jumpFrame = (Math.floor(frame / 6) % 3) + 1; // 1, 2, 3
          const jumpImg = processedSprites[name + '_JUMP_' + jumpFrame];
          if (jumpImg) { img = jumpImg; isJumpFrame = true; }
      } else if (pose === 'crouch') {
          const chargeFrame = (Math.floor(frame / 6) % 3) + 1; // 1, 2, 3
          const chargeImg = processedSprites[name + '_CHARGE_' + chargeFrame];
          if (chargeImg) { img = chargeImg; isChargeFrame = true; }
      } else if (pose === 'special') {
          const specialFrame = Math.min(4, Math.floor(frame / 6) + 1); // 1, 2, 3, 4
          const specialImg = processedSprites[name + '_SPECIAL_' + specialFrame];
          if (specialImg) { img = specialImg; isSpecialFrame = true; }
      } else if (pose === 'hit') {
          const hitImg = processedSprites[name + '_HIT_1'];
          if (hitImg) { img = hitImg; isHitFrame = true; }
      } else if (pose === 'ko') {
          const koImg = processedSprites[name + '_KO_1'];
          if (koImg) { img = koImg; isKoFrame = true; }
      }

      if (img) {
         const drawH = (game.state === STATE.SELECT) ? 220 : 300;
         const drawW = img.width * (drawH / img.height);
         
         ctx.save();
         if (!isWalkFrame && !isPunchFrame && !isKickFrame && !isJumpFrame && !isChargeFrame && !isSpecialFrame && !isHitFrame && !isKoFrame) {
             ctx.scale(-1, 1);
         }
         
         ctx.drawImage(img, -drawW/2, -drawH, drawW, drawH);
         ctx.restore();
      } else {
         ctx.fillStyle = '#ff00ff';
         ctx.fillRect(-30, -120, 60, 120);
      }

      ctx.restore();
    }

    // ── Projectile Class ──────────────────────────────────────
    class Projectile {
      constructor(owner, targetFighter) {
        this.owner   = owner;
        this.target  = targetFighter;
        this.element = owner.def.special.element;
        this.color   = owner.def.special.color;
        this.accent  = owner.colors.accent;
        this.damage  = Math.round(owner.def.special.damage * owner.stats.power);
        this.knockback = 12;
        this.hitstun   = 24;

        this.x = owner.x + owner.facing * 35;
        this.y = owner.y - 160;
        this.vx = owner.facing * 7;
        this.vy = 0;
        this.radius = 14;
        if (this.element === 'water') this.radius = 40; 
        this.alive  = true;
        this.age    = 0;
        this.hit    = false;
        this.hitCooldown = 0;

        playSFX('special', this.element);
      }

      get hitbox() {
        return {
          x: this.x - this.radius,
          y: this.y - this.radius,
          w: this.radius * 2,
          h: this.radius * 2
        };
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.age++;

        if (this.isTornado && this.age > 110) {
          this.alive = false;
          return;
        }
        
        if (this.ageLimit && this.age > this.ageLimit) {
          this.alive = false;
          if (this.element === 'fire') {
             spawnHitSparks(this.x, this.y, PAL.orange, 5);
          }
          return;
        }

        if (this.element === 'earth') {
          this.vy += 0.04;
        } else if (this.element === 'water') {
          this.y += Math.sin(this.age * 0.2) * 0.8;
        } else if (this.element === 'lightning') {
          this.y += Math.sin(this.age * 0.5) * 0.5; 
        }

        if (this.age % 2 === 0) {
          const trailColors = {
            fire: [PAL.red, PAL.orange, PAL.yellow],
            water: ['#66ccff', '#4488ff', PAL.white],
            lightning: [PAL.cyan, '#aaeeFF', PAL.white],
            earth: ['#8B6914', PAL.yellow, '#665522']
          };
          const cols = trailColors[this.element] || [this.color];
          for (let i = 0; i < 2; i++) {
            particles.push(new Particle(
              this.x + rand(-6, 6),
              this.y + rand(-6, 6),
              -this.vx * 0.2 + rand(-1, 1),
              rand(-1.5, 1.5),
              cols[randInt(0, cols.length - 1)],
              randInt(8, 18),
              randInt(2, 5)
            ));
          }
        }

        if (this.x < -40 || this.x > W + 40 || this.y > H + 40) {
          this.alive = false;
        }
      }

      draw() {
        const pulse = Math.sin(this.age * 0.3) * 3;
        const r = this.radius + pulse;

        if (this.isTornado) {
          ctx.globalAlpha = 0.8 + Math.sin(this.age * 0.4) * 0.2;
          for (let i = 0; i < 8; i++) {
            const h = r * 3;
            const yOffset = -h + (i * h / 8);
            const sliceW = r * 2 * (1 - i/10);
            const spiral = Math.sin(this.age * 0.5 + i) * (15 - i);
            ctx.fillStyle = (i % 2 === 0) ? '#2266cc' : '#66ccff';
            ctx.beginPath();
            ctx.ellipse(this.x + spiral, this.y + yOffset, sliceW, sliceW/4, 0, 0, Math.PI * 2);
            ctx.fill();
            if (Math.random() < 0.3) {
              pxRect(this.x + spiral + rand(-sliceW, sliceW), this.y + yOffset + rand(-5, 5), 3, 3, PAL.white);
            }
          }
          ctx.globalAlpha = 1;
        } else if (this.element === 'fire') {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.shadowColor = PAL.red;
          ctx.shadowBlur = 15 + Math.sin(this.age * 0.4) * 10;

          ctx.beginPath();
          ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
          const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.4);
          grd.addColorStop(0, 'rgba(255, 255, 0, 1)');
          grd.addColorStop(0.5, 'rgba(255, 100, 0, 0.8)');
          grd.addColorStop(1, 'rgba(255, 0, 0, 0)');
          ctx.fillStyle = grd;
          ctx.fill();

          const dir = Math.sign(this.vx) || 1;
          for (let j = 0; j < 3; j++) {
            ctx.fillStyle = (j === 0) ? PAL.red : (j === 1) ? PAL.orange : PAL.yellow;
            ctx.beginPath();
            const trailLen = r * (3 - j * 0.8) + Math.random() * r;
            const coreW = r * (1 - j * 0.2);
            ctx.moveTo(dir * coreW * 0.5, 0); 
            ctx.lineTo(-dir * trailLen, -coreW * 0.8 + Math.random() * coreW);
            ctx.lineTo(-dir * trailLen * 1.1, 0);
            ctx.lineTo(-dir * trailLen, coreW * 0.8 - Math.random() * coreW);
            ctx.closePath();
            ctx.fill();
          }

          ctx.beginPath(); 
          ctx.arc(dir * r * 0.2, 0, r * 0.4, 0, Math.PI*2); 
          ctx.fillStyle = PAL.white; 
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.restore();
          
          for (let i=0; i<3; i++) {
             particles.push(new Particle(
               this.x + rand(-r, r),
               this.y + rand(-r, r),
               -this.vx * rand(0.2, 0.6) + rand(-1, 1),
               rand(-3, 1),
               (Math.random() > 0.5) ? PAL.orange : PAL.yellow,
               randInt(10, 20),
               randInt(2, 5)
             ));
          }
        } else if (this.element === 'water') {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.age * 0.1);
          
          ctx.beginPath();
          ctx.arc(0, 0, r + 6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(102, 204, 255, 0.25)';
          ctx.fill();

          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          const grd = ctx.createRadialGradient(-r*0.2, -r*0.2, r * 0.1, 0, 0, r);
          grd.addColorStop(0, '#aaddff');
          grd.addColorStop(0.4, '#2266cc');
          grd.addColorStop(1, '#001144');
          ctx.fillStyle = grd;
          ctx.fill();
          
          ctx.globalAlpha = 0.5;
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
             ctx.beginPath();
             ctx.ellipse(0, 0, r * 0.8, r * 0.35, this.age * 0.2 + (i * Math.PI / 3), 0, Math.PI * 2);
             ctx.strokeStyle = '#66ccff';
             ctx.stroke();
          }

          ctx.globalAlpha = 0.85;
          ctx.beginPath();
          ctx.arc(-r * 0.35, -r * 0.35, r * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = PAL.white;
          ctx.fill();

          ctx.restore();

          if (this.age % 2 === 0) {
             for (let i = 0; i < 2; i++) {
               particles.push(new Particle(
                 this.x + rand(-r, r),
                 this.y + rand(-r, r),
                 this.vx * 0.2 + rand(-2, 1),
                 rand(-2, 3),
                 (Math.random() > 0.5) ? '#2266cc' : '#aaddff',
                 randInt(15, 25),
                 randInt(3, 6)
               ));
             }
          }
        } else if (this.element === 'lightning') {
          ctx.shadowColor = '#8A2BE2';
          ctx.shadowBlur = 10;
          ctx.fillStyle = '#8A2BE2'; 
          ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#E0B0FF'; 
          ctx.beginPath(); ctx.arc(this.x, this.y, r*0.6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = PAL.white; 
          ctx.beginPath(); ctx.arc(this.x, this.y, r*0.2, 0, Math.PI*2); ctx.fill();
          
          ctx.lineWidth = 3;
          for(let i=0; i<4; i++) {
             ctx.strokeStyle = (i % 2 === 0) ? PAL.white : '#E0B0FF';
             ctx.beginPath();
             ctx.moveTo(this.x, this.y);
             let lx = this.x, ly = this.y;
             for(let j=0; j<3; j++) {
                lx += rand(-r*2, r*2);
                ly += rand(-r*2, r*2);
                ctx.lineTo(lx, ly);
             }
             ctx.stroke();
          }
          ctx.shadowBlur = 0;
        } else if (this.element === 'earth') {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.age * 0.15);
          
          ctx.fillStyle = '#4A3515';
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const dist = r + (i % 2 === 0 ? r * 0.4 : -r * 0.2);
            ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#8B6914';
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const dist = (r * 0.7) + (i % 2 === 0 ? r * 0.3 : -r * 0.1);
            ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();

          pxRect(-2, -2, 4, 4, PAL.yellow);

          for(let i=0; i<4; i++) {
             const angle = this.age * 0.2 + (i * Math.PI * 2 / 4);
             const dist = r * 1.8;
             pxRect(Math.cos(angle)*dist, Math.sin(angle)*dist, 6, 6, '#554411');
          }
          ctx.restore();
        }
      }

      checkHit(defender) {
        if (!this.alive) return;
        if (this.hitCooldown && this.hitCooldown > 0) {
          this.hitCooldown--;
          return;
        }

        const hurtbox = defender.hurtbox;
        if (!rectsOverlap(this.hitbox, hurtbox)) return;

        if (!this.isTornado) {
          this.hit = true;
          this.alive = false;
        } else {
          this.hitCooldown = 15;
        }

        const knockDir = (this.vx > 0) ? 1 : -1;
        const dmg = defender.takeHit(this.damage, knockDir, this.knockback, this.hitstun);

        playSFX('hit');

        this.owner.comboCount++;
        this.owner.comboTimer = 60;
        
        this.owner.mana = Math.min(MAX_MANA, this.owner.mana + 15);
        defender.mana = Math.min(MAX_MANA, defender.mana + 2);

        const hx = this.x, hy = this.y;
        spawnSpecialFX(hx, hy, this.color, 35);
        triggerShake(10, 16);
        game.hitFlashTimer = 6;

        game.damageNumbers.push({
          x: hx, y: hy - 10, value: dmg, life: 45, vy: -2, color: this.color
        });
      }
    }

    let projectiles = [];

    // ── Fighter Class ─────────────────────────────────────────
    class Fighter {
      constructor(charDef, startX, facingDir, isAI = false) {
        this.def      = charDef;
        this.name     = charDef.name;
        this.colors   = charDef.colors;
        this.stats    = { ...charDef.stats };
        this.isAI     = isAI;

        this.x        = startX;
        this.y        = GROUND_Y;
        this.vx       = 0;
        this.vy       = 0;
        this.facing   = facingDir;
        this.onGround = true;

        this.health    = MAX_HEALTH;
        this.roundsWon = 0;

        this.state       = 'idle'; 
        this.attackType  = null;   
        this.attackFrame = 0;
        this.attackData  = null;
        this.hitRegistered = false; 
        this.hitstunTimer  = 0;
        this.mana          = 0; 

        this.animFrame = 0;
        this.walkCycle = 0;
        this.comboCount = 0;
        this.comboTimer = 0;

        this.aiTimer     = 0;
        this.aiAction    = null;
        this.aiDecisionCd = 0;
      }

      get hurtbox() {
        const w = 55, h = (this.state === 'crouching') ? 130 : 200;
        return {
          x: this.x - w / 2,
          y: this.y - h,
          w: w,
          h: h
        };
      }

      get hitbox() {
        if (this.state !== 'attacking' || !this.attackData) return null;
        if (this.attackType === 'special' || this.attackType === 'ultimate') return null;
        const atk = this.attackData;
        if (this.attackFrame < atk.startup || this.attackFrame >= atk.startup + atk.active) return null;

        const range = atk.range;
        const hbW = range + 10;
        const hbH = (this.attackType === 'heavyKick') ? 60 : 40;
        const hbX = (this.facing === 1) ? this.x + 20 : this.x - 20 - hbW;
        const hbY = (this.attackType === 'heavyKick') ? this.y - 120 : this.y - 150;

        return { x: hbX, y: hbY, w: hbW, h: hbH };
      }

      startAttack(type) {
        if (this.state === 'attacking' || this.state === 'hit' || this.state === 'ko') return;
        if (type === 'special' && this.mana < 50) return;
        if (type === 'lightProjectile' && this.mana < 15) return;
        if (type === 'ultimate' && this.mana < 100) return;
        if (!this.onGround && type === 'heavyKick') return; 

        this.state = 'attacking';
        this.attackType = type;
        this.attackFrame = 0;
        this.hitRegistered = false;

        if (type === 'special') {
          this.mana -= 50;
          this.attackData = {
            ...ATTACKS.special,
            damage: this.def.special.damage,
            range:  this.def.special.range,
            active: Math.round(this.def.special.frames * 0.3),
            recovery: Math.round(this.def.special.frames * 0.4)
          };
          this._spawnedProjectile = false;
        } else if (type === 'lightProjectile') {
          this.mana -= 15;
          this.attackData = {
            ...ATTACKS.lightPunch,
            damage: ATTACKS.lightPunch.damage,
            startup: 12,
            active: 10,
            recovery: 20
          };
          this._spawnedLightProjectile = false;
          playSFX('special', this.def.special.element); 
        } else if (type === 'ultimate') {
          this.mana -= 100;
          this.attackData = {
            damage: this.def.special.damage * 2.5, 
            startup: 20, 
            active: 30, 
            recovery: 40 
          };
          this._spawnedUltimate = false;
          playSFX('special', this.def.special.element); 
        } else {
          this.attackData = { ...ATTACKS[type] };
          playSFX(type === 'lightPunch' ? 'punch' : 'kick');
        }
        this.attackData.damage = Math.round(this.attackData.damage * this.stats.power);
      }

      takeHit(damage, knockbackDir, knockbackForce, hitstun) {
        const actualDmg = Math.max(1, Math.round(damage / this.stats.defense));
        this.health = Math.max(0, this.health - actualDmg);
        this.state = 'hit';
        this.hitstunTimer = hitstun;
        this.vx = knockbackDir * knockbackForce;
        this.vy = -3;
        this.attackType = null;
        this.attackData = null;

        if (this.health <= 0) {
          this.state = 'ko';
          this.vx = knockbackDir * knockbackForce * 1.5;
          this.vy = -6;
          playSFX('ko');
        }
        return actualDmg;
      }

      update() {
        this.animFrame++;

        if (!this.onGround) {
          this.vy += GRAVITY;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.vy = 0;
          this.onGround = true;
        } else {
          this.onGround = false;
        }

        this.x = clamp(this.x, 30, W - 30);

        if (this.onGround && this.state !== 'walking') {
          this.vx *= FRICTION;
        }

        if (this.comboTimer > 0) {
          this.comboTimer--;
          if (this.comboTimer <= 0) this.comboCount = 0;
        }

        switch (this.state) {
          case 'charging':
            this.mana = Math.min(MAX_MANA, this.mana + 1); 
            break;

          case 'hit':
            this.hitstunTimer--;
            this.vx *= 0.9;
            if (this.hitstunTimer <= 0) {
              this.state = 'idle';
            }
            break;

          case 'attacking':
            this.attackFrame++;
            const totalFrames = this.attackData.startup + this.attackData.active + this.attackData.recovery;
            
            if (this.attackType === 'special' && !this._spawnedProjectile &&
                this.attackFrame >= this.attackData.startup) {
              this._spawnedProjectile = true;
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              projectiles.push(new Projectile(this, opponent));
            }

            if (this.attackType === 'lightProjectile' && !this._spawnedLightProjectile &&
                this.attackFrame >= this.attackData.startup) {
              this._spawnedLightProjectile = true;
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              const p = new Projectile(this, opponent);
              p.isLight = true;
              p.damage = this.attackData.damage;
              p.radius = p.radius / 2; 
              p.vx = this.facing * 12; 
              projectiles.push(p);
            }

            if (this.attackType === 'ultimate' && !this._spawnedUltimate && 
                this.attackFrame >= this.attackData.startup) {
              this._spawnedUltimate = true;
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              
              if (this.name === 'HARAN') {
                triggerShake(20, 30);
                const startX = this.x;
                const dir = this.facing;
                
                particles.push({
                  life: 60, maxLife: 60, get dead() { return this.life <= 0; },
                  update() { this.life--; },
                  draw() {
                    if (this.life <= 0) return;
                    const progress = 1 - (this.life / this.maxLife);
                    const waveMaxDist = 600;
                    
                    ctx.save();
                    for (let sx = 0; sx < progress * waveMaxDist; sx += 40) {
                      const spikeX = startX + (dir * sx);
                      if (spikeX < -100 || spikeX > W + 100) continue;
                      
                      const age = progress * waveMaxDist - sx; 
                      let h = 90 - (age * 0.18) + Math.sin(sx * 0.5) * 20;
                      if (h < 0) h = 0;

                      ctx.fillStyle = '#4A3515';
                      ctx.beginPath();
                      ctx.moveTo(spikeX - 25, GROUND_Y);
                      ctx.lineTo(spikeX + (dir * 10), GROUND_Y - h);
                      ctx.lineTo(spikeX + 25, GROUND_Y);
                      ctx.fill();
                      
                      ctx.fillStyle = '#8B6914';
                      ctx.beginPath();
                      ctx.moveTo(spikeX - 12, GROUND_Y);
                      ctx.lineTo(spikeX + (dir * 10), GROUND_Y - h);
                      ctx.lineTo(spikeX + 12, GROUND_Y);
                      ctx.fill();
                      
                      if (Math.abs(sx - (progress * waveMaxDist)) < 50 && Math.random() < 0.4) {
                         spawnSpecialFX(spikeX, GROUND_Y, '#CD853F', 3);
                      }
                    }
                    ctx.restore();
                  }
                });

                const p = new Projectile(this, opponent);
                p.vx = this.facing * 10;
                p.radius = 40;
                p.element = 'none'; 
                p.damage = this.attackData.damage;
                p.isTornado = false;
                p.color = 'transparent';
                p.draw = () => {}; 
                p.ageLimit = 60;
                p.update = function() {
                  this.x += this.vx;
                  this.y = GROUND_Y - 20; 
                  this.age++;
                  if (this.age > this.ageLimit) this.alive = false;
                };
                projectiles.push(p);
              } else if (this.name === 'OMKAR') {
                triggerShake(8, 20);
                for (let i = 0; i < 5; i++) {
                   setTimeout(() => {
                     const p = new Projectile(this, opponent);
                     p.vy = rand(-2, 2); 
                     p.vx = this.facing * rand(6, 10);
                     p.knockback = 5;
                     p.damage = Math.round(this.attackData.damage / 4); 
                     p.ageLimit = randInt(25, 40); 
                     projectiles.push(p);
                   }, i * 100);
                }
              } else if (this.name === 'PRANAV') {
                triggerShake(15, 30);
                const strikeX = opponent.x;
                
                particles.push({
                  x: strikeX, y: 0, 
                  life: 30, maxLife: 30, get dead() { return this.life <= 0; },
                  update() { this.life--; },
                  draw() {
                     if (this.life <= 0) return;
                     const alpha = Math.min(1, this.life / 10);
                     
                     ctx.save();
                     ctx.globalAlpha = alpha;
                     ctx.shadowBlur = 20 + rand(0, 10);
                     ctx.shadowColor = '#8A2BE2';
                     
                     for (let b = 0; b < 3; b++) {
                         ctx.beginPath();
                         ctx.moveTo(this.x + rand(-30, 30), 0);
                         let currY = 0;
                         let currX = this.x;
                         
                         while (currY < GROUND_Y) {
                             currX += rand(-40, 40);
                             currY += rand(40, 90);
                             ctx.lineTo(currX, currY);
                         }
                         
                         ctx.lineWidth = (b === 0) ? rand(8, 12) : rand(2, 5); 
                         ctx.strokeStyle = (b === 0) ? '#FFFFFF' : ((b === 1) ? '#E0B0FF' : '#8A2BE2');
                         ctx.stroke();
                     }

                     ctx.globalAlpha = alpha * 0.8;
                     ctx.beginPath();
                     ctx.ellipse(this.x, GROUND_Y, 90 + rand(-15, 15), 20 + rand(-5, 5), 0, 0, Math.PI * 2);
                     ctx.fillStyle = '#E0B0FF';
                     ctx.fill();

                     ctx.restore();
                  }
                });

                if (Math.abs(opponent.x - strikeX) < 60 && opponent.state !== 'ko') {
                  opponent.takeHit(this.attackData.damage, this.facing, 8, 40);
                  opponent.mana = Math.min(MAX_MANA, opponent.mana + 5);
                }
              } else if (this.name === 'ESWAR') {
                 const p = new Projectile(this, opponent);
                 p.vx = this.facing * 3; 
                 p.radius = 24; 
                 p.isTornado = true;
                 p.hit = false; 
                 p.damage = Math.round(this.attackData.damage / 5); 
                 projectiles.push(p);
              }
            }

            if (this.attackFrame >= totalFrames) {
              this.state = 'idle';
              this.attackType = null;
              this.attackData = null;
            }
            break;

          case 'ko':
            this.vx *= 0.92;
            break;
        }

        if (this.state === 'walking') {
          this.walkCycle += 0.15;
        }
      }

      get pose() {
        if (this.state === 'charging') return 'crouch';
        if (this.state === 'ko') return 'ko';
        if (this.state === 'hit') return 'hit';
        if (this.state === 'crouching') return 'crouch';
        if (this.state === 'attacking') {
          if (this.attackType === 'lightPunch') return 'lightPunch';
          if (this.attackType === 'heavyKick')  return 'heavyKick';
          if (this.attackType === 'special' || this.attackType === 'ultimate' || this.attackType === 'lightProjectile') return 'special';
        }
        if (!this.onGround) return 'jump';
        if (this.state === 'walking') return (Math.sin(this.walkCycle) > 0) ? 'walk1' : 'walk2';
        return 'idle';
      }

      draw() {
        const currentFrame = (this.state === 'attacking') ? this.attackFrame : this.animFrame;
        drawCharacter(this.x, this.y, this.name, this.facing, this.pose, currentFrame);

        if (this.state === 'attacking' && (this.attackType === 'special' || this.attackType === 'lightProjectile') && !this._spawnedProjectile && !this._spawnedLightProjectile) {
          const progress = this.attackFrame / this.attackData.startup;
          const spColor = this.def.special.color;
          ctx.globalAlpha = 0.3 + progress * 0.4;
          const glowR = (this.attackType === 'lightProjectile') ? (10 + progress * 20) : (20 + progress * 40);
          const gx = this.x + this.facing * 30;
          const gy = this.y - 150;
          pxRect(gx - glowR / 2, gy - glowR / 2, glowR, glowR, spColor);
          pxRect(gx - glowR / 4, gy - glowR / 4, glowR / 2, glowR / 2, PAL.white);
          ctx.globalAlpha = 1;
          if (this.animFrame % 3 === 0) {
            spawnHitSparks(gx, gy, spColor, 2);
          }
        }
        
        if (this.state === 'charging') {
          const charColor = this.def.special.color;
          const auraR = 55 + Math.sin(this.animFrame * 0.4) * 10;
          ctx.save();
          ctx.translate(this.x, this.y - 60);
          ctx.rotate(this.animFrame * 0.1);
          
          ctx.shadowColor = charColor;
          ctx.shadowBlur = 20 + Math.sin(this.animFrame * 0.3) * 10;

          ctx.globalAlpha = 0.4 + Math.sin(this.animFrame * 0.2) * 0.2;
          ctx.fillStyle = charColor;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
             const angle = (i / 8) * Math.PI * 2;
             const dist = auraR + (i % 2 === 0 ? 15 : -10) + Math.sin(this.animFrame * 0.5 + i) * 5;
             ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();
          
          ctx.globalAlpha = 0.8;
          ctx.shadowColor = this.colors.accent || charColor;
          ctx.shadowBlur = 15;
          ctx.fillStyle = this.colors.accent || charColor; 
          ctx.rotate(-this.animFrame * 0.2); 
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
             const angle = (i / 8) * Math.PI * 2;
             const dist = (auraR * 0.6) + (i % 2 === 0 ? 10 : -5);
             ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();
          
          ctx.shadowBlur = 0;
          ctx.restore();
          
          if (this.animFrame % 2 === 0) {
             particles.push(new Particle(
                this.x + rand(-30, 30),
                this.y - 10 + rand(-10, 10),
                rand(-1, 1),
                rand(-6, -2), 
                charColor,
                randInt(15, 30),
                randInt(2, 5)
             ));
             if (Math.random() > 0.5) {
                 spawnHitSparks(this.x + rand(-30, 30), this.y - rand(10, 100), this.colors.accent, 1);
             }
          }
        }
      }
    }

    // ── AI Controller ─────────────────────────────────────────
    function updateAI(ai, player) {
      if (ai.state === 'ko' || ai.state === 'hit') return;

      ai.aiDecisionCd--;
      if (ai.aiDecisionCd > 0) return;
      ai.aiDecisionCd = Math.round(AI_REACT_MS / 16.67) + randInt(-2, 4); 

      const dist = Math.abs(ai.x - player.x);
      const facingPlayer = (player.x > ai.x) ? 1 : -1;
      ai.facing = facingPlayer;

      if (player.state === 'ko') {
        ai.state = 'idle';
        return;
      }

      if (ai.state === 'charging') {
        if (dist < 150) {
          ai.state = 'idle'; 
        } else if (ai.mana >= 100 || Math.random() < 0.05) {
          ai.state = 'idle'; 
        } else {
          return; 
        }
      }

      const incoming = projectiles.find(p => p.owner !== ai && Math.abs(p.x - ai.x) < 280 && Math.abs(p.y - ai.y) < 100);
      if (incoming && ai.onGround && Math.random() < 0.98) { 
        ai.vy = ai.stats.jumpForce * 1.15; 
        ai.onGround = false;
        ai.state = 'jumping';
        ai.vx = facingPlayer * ai.stats.speed;
        return;
      }

      if (ai.health < 50 && ai.mana >= 100) {
        ai.startAttack('ultimate');
        return;
      }

      if (dist < 60) {
        if (ai.mana >= 100 && Math.random() < 0.8) {
          ai.startAttack('ultimate');
        } else if (ai.mana >= 50 && Math.random() < 0.7) {
          ai.startAttack('special');
        } else {
          const r = Math.random();
          if (r < 0.5) {
            ai.startAttack('lightPunch');
          } else if (r < 0.9) {
            ai.startAttack('heavyKick');
          } else {
            ai.vx = -facingPlayer * 5;
            ai.state = 'idle';
          }
        }
      } else if (dist < 140) {
        if (ai.mana >= 100 && Math.random() < 0.6) {
          ai.startAttack('ultimate');
        } else if (ai.mana >= 50 && Math.random() < 0.5) {
          ai.startAttack('special');
        } else if (Math.random() < 0.4 && ai.state !== 'attacking') {
          ai.vx = facingPlayer * ai.stats.speed * 1.2;
          ai.state = 'walking';
        } else {
          ai.startAttack('heavyKick');
        }
      } else if (dist < 250) {
        if (ai.mana < 100 && Math.random() < 0.3) {
          ai.state = 'charging';
          ai.vx = 0;
        } else if (Math.random() < 0.7) {
          ai.vx = facingPlayer * ai.stats.speed;
          ai.state = 'walking';
        } else if (Math.random() < 0.3 && ai.onGround) {
          ai.vy = ai.stats.jumpForce;
          ai.onGround = false;
          ai.state = 'jumping';
          ai.vx = facingPlayer * ai.stats.speed * 0.8;
        }
      } else {
        if (ai.mana < 100 && Math.random() < 0.5) {
          ai.state = 'charging';
          ai.vx = 0;
        } else {
          ai.vx = facingPlayer * ai.stats.speed * 1.2;
          ai.state = 'walking';
          if (Math.random() < 0.2 && ai.onGround) {
            ai.vy = ai.stats.jumpForce;
            ai.onGround = false;
          }
        }
      }
    }

    // ── Player Input Handler ──────────────────────────────────
    function handlePlayerInput(player) {
      if (player.state === 'ko' || player.state === 'hit' || player.state === 'attacking') return;

      let moving = false;

      if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx = -player.stats.speed;
        player.state = 'walking';
        moving = true;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx = player.stats.speed;
        player.state = 'walking';
        moving = true;
      }

      if (keys['ArrowDown'] || keys['KeyS']) {
        player.state = 'crouching';
        player.vx *= 0.5;
        moving = true;
      }

      if ((keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
        player.vy = player.stats.jumpForce;
        player.onGround = false;
        player.state = 'jumping';
      }

      if (keys['KeyJ'] || keys['KeyZ']) {
        player.startAttack('lightPunch');
      }
      if (keys['KeyK'] || keys['KeyX']) {
        player.startAttack('heavyKick');
      }
      if (keys['KeyI'] || keys['KeyC']) {
        player.startAttack('special');
      }
      if (keys['KeyO'] || keys['KeyP']) {
        player.startAttack('lightProjectile');
      }
      if (keys['KeyL'] || keys['KeyV']) {
        player.startAttack('ultimate');
      }
      
      if ((keys['KeyE'] || keys['KeyU']) && player.onGround && player.state !== 'attacking') {
        player.state = 'charging';
        player.vx = 0;
        moving = true;
      }

      if (!moving && player.onGround && player.state !== 'attacking') {
        player.state = 'idle';
      }
    }

    // ── Collision / Hit Detection ─────────────────────────────
    function checkHitDetection(attacker, defender) {
      if (attacker.state !== 'attacking' || attacker.hitRegistered) return;

      const hitbox = attacker.hitbox;
      if (!hitbox) return;

      const hurtbox = defender.hurtbox;
      if (!rectsOverlap(hitbox, hurtbox)) return;

      attacker.hitRegistered = true;
      const knockDir = (attacker.x < defender.x) ? 1 : -1;
      const dmg = defender.takeHit(
        attacker.attackData.damage,
        knockDir,
        attacker.attackData.knockback,
        attacker.attackData.hitstun
      );

      playSFX('hit');

      attacker.comboCount++;
      attacker.comboTimer = 60;
      
      attacker.mana = Math.min(MAX_MANA, attacker.mana + (attacker.attackType === 'heavyKick' ? 6 : 4));
      defender.mana = Math.min(MAX_MANA, defender.mana + 1);

      const hitX = (hitbox.x + hitbox.w / 2 + hurtbox.x + hurtbox.w / 2) / 2;
      const hitY = (hitbox.y + hitbox.h / 2 + hurtbox.y + hurtbox.h / 2) / 2;

      if (attacker.attackType === 'special') {
        spawnSpecialFX(hitX, hitY, attacker.def.special.color, 30);
        triggerShake(8, 14);
        game.hitFlashTimer = 6;
      } else if (attacker.attackType === 'heavyKick') {
        spawnHitSparks(hitX, hitY, PAL.yellow, 15);
        triggerShake(5, 8);
        game.hitFlashTimer = 4;
      } else {
        spawnHitSparks(hitX, hitY, PAL.white, 8);
        triggerShake(2, 4);
        game.hitFlashTimer = 2;
      }

      game.damageNumbers.push({
        x: hitX, y: hitY - 10,
        value: dmg,
        life: 40,
        vy: -2,
        color: (attacker.attackType === 'special') ? attacker.def.special.color : PAL.yellow
      });
    }

    }

    // ── Announcement Text (FIGHT! / ROUND X) ─────────────────
    function drawAnnouncement() {
      if (game.announceTimer <= 0) return;
      game.announceTimer--;
      const alpha = clamp(game.announceTimer / 20, 0, 1);
      const scale = 1 + (1 - alpha) * 0.5;
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(W / 2, H / 2 - 40);
      ctx.scale(scale, scale);
      pxText(game.announceText, 0, 0, 28, game.announceColor, 'center');
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ── Game Manager ──────────────────────────────────────────
    const game = {
      state:         STATE.TITLE,
      globalFrame:   0,
      player1:       null,
      player2:       null,
      p1CharIdx:     -1,
      p2CharIdx:     -1,
      roundTimer:    0,
      roundEndTimer: 0,
      matchEndTimer: 0,
      hitFlashTimer: 0,
      damageNumbers: [],
      announceText:  '',
      announceColor: PAL.white,
      announceTimer: 0,
      currentRound:  1,

      announce(text, color = PAL.white) {
        this.announceText  = text;
        this.announceColor = color;
        this.announceTimer = 80;
      },

      selectPlayer(index) {
        this.p1CharIdx = index;
        const remaining = [0, 1, 2, 3].filter(i => i !== index);
        this.p2CharIdx = remaining[randInt(0, remaining.length - 1)];
        this.startMatch();
      },

      startMatch() {
        this.state = STATE.FIGHT;
        this.currentRound = 1;
        this.player1 = new Fighter(CHAR_DEFS[this.p1CharIdx], 200, 1, false);
        this.player2 = new Fighter(CHAR_DEFS[this.p2CharIdx], W - 200, -1, true);
        this.roundTimer = 99 * 60; 
        this.announce(`ROUND ${this.currentRound}`, PAL.yellow);
        setTimeout(() => this.announce('FIGHT!', PAL.red), 1400);
      },

      startNewRound() {
        this.player1.x = 200;
        this.player1.y = GROUND_Y;
        this.player1.vx = 0;
        this.player1.vy = 0;
        this.player1.health = MAX_HEALTH;
        this.player1.state = 'idle';
        this.player1.hitstunTimer = 0;
        this.player1.mana = 0;
        this.player1.comboCount = 0;
        this.player1.facing = 1;

        this.player2.x = W - 200;
        this.player2.y = GROUND_Y;
        this.player2.vx = 0;
        this.player2.vy = 0;
        this.player2.health = MAX_HEALTH;
        this.player2.state = 'idle';
        this.player2.hitstunTimer = 0;
        this.player2.mana = 0;
        this.player2.comboCount = 0;
        this.player2.facing = -1;

        this.roundTimer = 99 * 60;
        this.currentRound++;
        this.damageNumbers = [];
        particles = [];
        projectiles = [];

        this.announce(`ROUND ${this.currentRound}`, PAL.yellow);
        setTimeout(() => this.announce('FIGHT!', PAL.red), 1400);
      },

      endRound(winner) {
        this.state = STATE.ROUND_END;
        this.roundEndTimer = 180;
        if (winner) {
          winner.roundsWon++;
        }
        if (winner && winner.roundsWon >= ROUND_WIN) {
          setTimeout(() => {
            this.state = STATE.MATCH_END;
            this.matchEndTimer = 0;
          }, 2500);
        }
      },

      update() {
        this.globalFrame++;

        if (this.state === STATE.TITLE) {
          if (keys['Enter'] || keys['Space']) {
            this.state = STATE.SELECT;
            keys['Enter'] = false;
            keys['Space'] = false;
          }
          return;
        }

        if (this.state === STATE.SELECT) {
          return;
        }

        if (this.state === STATE.MATCH_END) {
          this.matchEndTimer++;
          if (keys['Enter'] || keys['Space']) {
            this.state = STATE.SELECT;
            this.p1CharIdx = -1;
            this.p2CharIdx = -1;
            keys['Enter'] = false;
            keys['Space'] = false;
          }
          return;
        }

        if (this.state === STATE.ROUND_END) {
          this.roundEndTimer--;
          if (this.roundEndTimer <= 0) {
            this.state = STATE.FIGHT;
            this.startNewRound();
          }
          return;
        }

        const p1 = this.player1;
        const p2 = this.player2;

        this.roundTimer--;
        if (this.roundTimer <= 0) {
          const winner = (p1.health >= p2.health) ? p1 : p2;
          this.endRound(winner);
          return;
        }

        if (p1.state !== 'attacking' && p1.state !== 'hit') {
          p1.facing = (p2.x > p1.x) ? 1 : -1;
        }
        if (p2.state !== 'attacking' && p2.state !== 'hit') {
          p2.facing = (p1.x > p2.x) ? 1 : -1;
        }

        handlePlayerInput(p1);
        updateAI(p2, p1);

        p1.update();
        p2.update();

        const overlap = 30 - Math.abs(p1.x - p2.x);
        if (overlap > 0 && Math.abs(p1.y - p2.y) < 60) {
          const push = overlap / 2 + 0.5;
          if (p1.x < p2.x) {
            p1.x -= push;
            p2.x += push;
          } else {
            p1.x += push;
            p2.x -= push;
          }
        }

        checkHitDetection(p1, p2);
        checkHitDetection(p2, p1);

        projectiles.forEach(proj => {
          if (!proj.alive) return;
          proj.update();
          const defender = (proj.owner === p1) ? p2 : p1;
          proj.checkHit(defender);
        });
        projectiles = projectiles.filter(p => p.alive);

        if (p1.state === 'ko' && p1.onGround) {
          this.endRound(p2);
        }
        if (p2.state === 'ko' && p2.onGround) {
          this.endRound(p1);
        }

        if (this.hitFlashTimer > 0) this.hitFlashTimer--;

        particles = particles.filter(p => { p.update(); return !p.dead; });

        updateShake();
      },

      draw() {
        ctx.save();

        if (this.state === STATE.TITLE) {
          drawTitleScreen();
          ctx.restore();
          mouseClicked = false;
          return;
        }

        if (this.state === STATE.SELECT) {
          drawSelectScreen();
          ctx.restore();
          mouseClicked = false;
          return;
        }

        ctx.translate(shakeOffsetX, shakeOffsetY);

        if (this.hitFlashTimer > 0 && this.hitFlashTimer % 2 === 0) {
          pxRect(0, 0, W, H, 'rgba(255,255,255,0.15)');
        }

        drawBackground();

        const p1 = this.player1;
        const p2 = this.player2;
        p1.draw();
        p2.draw();

        projectiles.forEach(proj => proj.draw());

        particles.forEach(p => p.draw());

        updateAndDrawDamageNumbers();

        drawHUD(p1, p2);

        drawAnnouncement();

        if (this.state === STATE.ROUND_END) {
          const winner = (p1.health > p2.health) ? p1 : ((p2.health > p1.health) ? p2 : null);
          drawRoundEnd(winner);
        }

        if (this.state === STATE.MATCH_END) {
          const winner = (p1.roundsWon >= ROUND_WIN) ? p1 : p2;
          drawMatchEnd(winner);
        }

        ctx.restore();
        mouseClicked = false;
      }
    };

    // ── Main Game Loop Wrapper ────────────────────────────────────────
    function gameLoop() {
      ctx.clearRect(0, 0, W, H);
      pxRect(0, 0, W, H, PAL.bg);

      // Await asset downloads securely before passing frames to engine
      if (!gameReady) {
        pxText("LOADING BRAWLERS...", W / 2, H / 2 - 20, 16, PAL.yellow, 'center');
        const loadPct = totalAssetsCount === 0 ? 0 : Math.round((loadedAssetsCount / totalAssetsCount) * 100);
        pxText(`${loadPct}%`, W / 2, H / 2 + 15, 12, PAL.white, 'center');
      } else {
        game.update();
        game.draw();
      }

      requestAnimationFrame(gameLoop);
    }

    // ── Start! ────────────────────────────────────────────────
    requestAnimationFrame(gameLoop);

  </script>
</body>
</html>
