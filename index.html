    // ── Pixel-Art Character Renderer (ASCII High Detail) ─────────────
    function drawCharacter(x, y, name, facing, pose, frame) {
      ctx.save();
      ctx.translate(Math.round(x), Math.round(y));

      let startY = 0;
      // Removed procedural bobbing for idle state since custom sprites are used
      if (pose === 'walk1') startY -= 3;
      if (pose === 'walk2') startY += 3;

      let scaleX = facing;
      let scaleY = 1;
      let rotation = 0;

      // The puppet animation distortions (squash/stretch) have been removed 
      // since the game now relies entirely on custom generated sprite frames.
      // We only apply a tilt for hit/ko states as they don't have custom frames yet.
      if (pose === 'hit' || pose === 'ko') {
         rotation = -0.2; // tilt back
      }

      ctx.translate(0, startY);
      ctx.scale(scaleX, scaleY);
      ctx.rotate(rotation);

      let img = processedSprites[name];
      let isWalkFrame = false;
      let isPunchFrame = false;
      let isKickFrame = false;
      let isJumpFrame = false;
      let isChargeFrame = false;
      let isSpecialFrame = false;
      let isHitFrame = false;
      let isKoFrame = false;
      
      // Unified Dynamic Animation Fetcher for all characters
      if (pose === 'walk1' || pose === 'walk2' || pose === 'walking') {
          const walkFrame = (Math.floor(frame / 6) % 4) + 1; // 1, 2, 3, or 4
          const walkImg = processedSprites[name + '_WALK_' + walkFrame];
          if (walkImg) {
              img = walkImg;
              isWalkFrame = true;
          }
      } else if (pose === 'lightPunch') {
          const punchFrame = Math.min(3, Math.floor(frame / 4) + 1); // 1, 2, 3
          const punchImg = processedSprites[name + '_PUNCH_' + punchFrame];
          if (punchImg) {
              img = punchImg;
              isPunchFrame = true;
          }
      } else if (pose === 'heavyKick') {
          const kickFrame = Math.min(4, Math.floor(frame / 6) + 1); // 1, 2, 3, 4
          const kickImg = processedSprites[name + '_KICK_' + kickFrame];
          if (kickImg) {
              img = kickImg;
              isKickFrame = true;
          }
      } else if (pose === 'jump') {
          const jumpFrame = (Math.floor(frame / 6) % 3) + 1; // 1, 2, 3
          const jumpImg = processedSprites[name + '_JUMP_' + jumpFrame];
          if (jumpImg) {
              img = jumpImg;
              isJumpFrame = true;
          }
      } else if (pose === 'crouch') {
          const chargeFrame = (Math.floor(frame / 6) % 3) + 1; // 1, 2, 3
          const chargeImg = processedSprites[name + '_CHARGE_' + chargeFrame];
          if (chargeImg) {
              img = chargeImg;
              isChargeFrame = true;
          }
      } else if (pose === 'special') {
          const specialFrame = Math.min(4, Math.floor(frame / 6) + 1); // 1, 2, 3, 4
          const specialImg = processedSprites[name + '_SPECIAL_' + specialFrame];
          if (specialImg) {
              img = specialImg;
              isSpecialFrame = true;
          }
      } else if (pose === 'hit') {
          const hitImg = processedSprites[name + '_HIT_1'];
          if (hitImg) {
              img = hitImg;
              isHitFrame = true;
          }
      } else if (pose === 'ko') {
          const koImg = processedSprites[name + '_KO_1'];
          if (koImg) {
              img = koImg;
              isKoFrame = true;
          }
      }

      if (img) {
         // The original character was about 80px tall for gameplay physics.
         // Let's visually scale the high-res sprite to ~240px tall to fit nicely against the background.
         const drawH = (game.state === STATE.SELECT) ? 220 : 300;
         const drawW = img.width * (drawH / img.height);
         
         ctx.save();
         // If the character's base image naturally faces left, flip it here to face right 
         // so it matches the Puppet Animation Engine's expectations.
         if (!isWalkFrame && !isPunchFrame && !isKickFrame && !isJumpFrame && !isChargeFrame && !isSpecialFrame && !isHitFrame && !isKoFrame) {
             ctx.scale(-1, 1);
         }
         
         // Draw horizontally centered, anchored at feet (0,0)
         ctx.drawImage(img, -drawW/2, -drawH, drawW, drawH);
         ctx.restore();
      } else {
         // Fallback if not loaded
         ctx.fillStyle = '#ff00ff';
         ctx.fillRect(-30, -120, 60, 120);
      }

      ctx.restore();
    }

    // ── Projectile Class (Elemental Balls) ─────────────────────
    class Projectile {
      constructor(owner, targetFighter) {
        this.owner   = owner;
        this.target  = targetFighter;
        this.element = owner.def.special.element;
        this.color   = owner.def.special.color;
        this.accent  = owner.colors.accent;
        this.damage  = Math.round(owner.def.special.damage * owner.stats.power);
        this.knockback = 12;
        this.hitstun   = 24;

        // Spawn at character's chest position
        this.x = owner.x + owner.facing * 35;
        this.y = owner.y - 160;
        this.vx = owner.facing * 7;  // travel speed
        this.vy = 0;
        this.radius = 14;
        if (this.element === 'water') this.radius = 40; // Extremely big!
        this.alive  = true;
        this.age    = 0;
        this.hit    = false;

        this.hitCooldown = 0;
        // Play launch whoosh SFX
        playSFX('special', this.element);
      }

      get hitbox() {
        return {
          x: this.x - this.radius,
          y: this.y - this.radius,
          w: this.radius * 2,
          h: this.radius * 2
        };
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.age++;

        // Tornado lifespan limit
        if (this.isTornado && this.age > 110) {
          this.alive = false;
          return;
        }
        
        // Generic custom lifespan limit
        if (this.ageLimit && this.age > this.ageLimit) {
          this.alive = false;
          // Spawn fizzle effect
          if (this.element === 'fire') {
             spawnHitSparks(this.x, this.y, PAL.orange, 5);
          }
          return;
        }

        // Slight gravity for earth, wave motion for water
        if (this.element === 'earth') {
          this.vy += 0.04;  // slight arc
        } else if (this.element === 'water') {
          this.y += Math.sin(this.age * 0.2) * 0.8;
        } else if (this.element === 'lightning') {
          this.y += Math.sin(this.age * 0.5) * 0.5; // jitter
        }

        // Trail particles every 2 frames
        if (this.age % 2 === 0) {
          const trailColors = {
            fire: [PAL.red, PAL.orange, PAL.yellow],
            water: ['#66ccff', '#4488ff', PAL.white],
            lightning: [PAL.cyan, '#aaeeFF', PAL.white],
            earth: ['#8B6914', PAL.yellow, '#665522']
          };
          const cols = trailColors[this.element] || [this.color];
          for (let i = 0; i < 2; i++) {
            particles.push(new Particle(
              this.x + rand(-6, 6),
              this.y + rand(-6, 6),
              -this.vx * 0.2 + rand(-1, 1),
              rand(-1.5, 1.5),
              cols[randInt(0, cols.length - 1)],
              randInt(8, 18),
              randInt(2, 5)
            ));
          }
        }

        // Off-screen kill
        if (this.x < -40 || this.x > W + 40 || this.y > H + 40) {
          this.alive = false;
        }
      }

      draw() {
        const pulse = Math.sin(this.age * 0.3) * 3;
        const r = this.radius + pulse;

        // Element-specific rendering
        if (this.isTornado) {
          // Swirling tornado with bezier trails
          ctx.globalAlpha = 0.8 + Math.sin(this.age * 0.4) * 0.2;
          for (let i = 0; i < 8; i++) {
            const h = r * 3;
            const yOffset = -h + (i * h / 8);
            const sliceW = r * 2 * (1 - i/10);
            const spiral = Math.sin(this.age * 0.5 + i) * (15 - i);
            ctx.fillStyle = (i % 2 === 0) ? '#2266cc' : '#66ccff';
            ctx.beginPath();
            ctx.ellipse(this.x + spiral, this.y + yOffset, sliceW, sliceW/4, 0, 0, Math.PI * 2);
            ctx.fill();
            // Swirling water droplets
            if (Math.random() < 0.3) {
              pxRect(this.x + spiral + rand(-sliceW, sliceW), this.y + yOffset + rand(-5, 5), 3, 3, PAL.white);
            }
          }
          ctx.globalAlpha = 1;
        } else if (this.element === 'fire') {
          // Blazing fiery comet
          ctx.save();
          ctx.translate(this.x, this.y);

          // Add a pulsating glow
          ctx.shadowColor = PAL.red;
          ctx.shadowBlur = 15 + Math.sin(this.age * 0.4) * 10;

          // Fiery aura gradient
          ctx.beginPath();
          ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
          const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.4);
          grd.addColorStop(0, 'rgba(255, 255, 0, 1)');
          grd.addColorStop(0.5, 'rgba(255, 100, 0, 0.8)');
          grd.addColorStop(1, 'rgba(255, 0, 0, 0)');
          ctx.fillStyle = grd;
          ctx.fill();

          // Dynamic jagged flame trails pointing backward
          const dir = Math.sign(this.vx) || 1;
          for (let j = 0; j < 3; j++) {
            ctx.fillStyle = (j === 0) ? PAL.red : (j === 1) ? PAL.orange : PAL.yellow;
            ctx.beginPath();
            const trailLen = r * (3 - j * 0.8) + Math.random() * r;
            const coreW = r * (1 - j * 0.2);
            ctx.moveTo(dir * coreW * 0.5, 0); 
            ctx.lineTo(-dir * trailLen, -coreW * 0.8 + Math.random() * coreW);
            ctx.lineTo(-dir * trailLen * 1.1, 0);
            ctx.lineTo(-dir * trailLen, coreW * 0.8 - Math.random() * coreW);
            ctx.closePath();
            ctx.fill();
          }

          // Superhot inner core
          ctx.beginPath(); 
          ctx.arc(dir * r * 0.2, 0, r * 0.4, 0, Math.PI*2); 
          ctx.fillStyle = PAL.white; 
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.restore();
          
          // Embers
          for (let i=0; i<3; i++) {
             particles.push(new Particle(
               this.x + rand(-r, r),
               this.y + rand(-r, r),
               -this.vx * rand(0.2, 0.6) + rand(-1, 1),
               rand(-3, 1), // embers float up
               (Math.random() > 0.5) ? PAL.orange : PAL.yellow,
               randInt(10, 20),
               randInt(2, 5)
             ));
          }
        } else if (this.element === 'water') {
          // Extremely large, highly detailed swirling water orb
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.age * 0.1);
          
          // Outer watery glow
          ctx.beginPath();
          ctx.arc(0, 0, r + 6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(102, 204, 255, 0.25)';
          ctx.fill();

          // Main orb base with 3D gradient
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          const grd = ctx.createRadialGradient(-r*0.2, -r*0.2, r * 0.1, 0, 0, r);
          grd.addColorStop(0, '#aaddff');
          grd.addColorStop(0.4, '#2266cc');
          grd.addColorStop(1, '#001144');
          ctx.fillStyle = grd;
          ctx.fill();
          
          // Swirling inner rings for dynamic motion
          ctx.globalAlpha = 0.5;
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
             ctx.beginPath();
             ctx.ellipse(0, 0, r * 0.8, r * 0.35, this.age * 0.2 + (i * Math.PI / 3), 0, Math.PI * 2);
             ctx.strokeStyle = '#66ccff';
             ctx.stroke();
          }

          // Specular bright highlight (gives it a perfectly round, liquid reflection)
          ctx.globalAlpha = 0.85;
          ctx.beginPath();
          ctx.arc(-r * 0.35, -r * 0.35, r * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = PAL.white;
          ctx.fill();

          ctx.restore();

          // Droplets breaking off
          if (this.age % 2 === 0) {
             for (let i = 0; i < 2; i++) {
               particles.push(new Particle(
                 this.x + rand(-r, r),
                 this.y + rand(-r, r),
                 this.vx * 0.2 + rand(-2, 1),
                 rand(-2, 3),
                 (Math.random() > 0.5) ? '#2266cc' : '#aaddff',
                 randInt(15, 25),
                 randInt(3, 6)
               ));
             }
          }
        } else if (this.element === 'lightning') {
          // Branching lightning arcs
          ctx.shadowColor = '#8A2BE2';
          ctx.shadowBlur = 10;
          ctx.fillStyle = '#8A2BE2'; // Violet core
          ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#E0B0FF'; // Light violet inner
          ctx.beginPath(); ctx.arc(this.x, this.y, r*0.6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = PAL.white; // Bright center
          ctx.beginPath(); ctx.arc(this.x, this.y, r*0.2, 0, Math.PI*2); ctx.fill();
          
          ctx.lineWidth = 3;
          for(let i=0; i<4; i++) {
             ctx.strokeStyle = (i % 2 === 0) ? PAL.white : '#E0B0FF';
             ctx.beginPath();
             ctx.moveTo(this.x, this.y);
             let lx = this.x, ly = this.y;
             for(let j=0; j<3; j++) {
                lx += rand(-r*2, r*2);
                ly += rand(-r*2, r*2);
                ctx.lineTo(lx, ly);
             }
             ctx.stroke();
          }
          ctx.shadowBlur = 0;
        } else if (this.element === 'earth') {
          // Jagged rocky meteor
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.age * 0.15);
          
          ctx.fillStyle = '#4A3515';
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const dist = r + (i % 2 === 0 ? r * 0.4 : -r * 0.2);
            ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#8B6914';
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const dist = (r * 0.7) + (i % 2 === 0 ? r * 0.3 : -r * 0.1);
            ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();

          pxRect(-2, -2, 4, 4, PAL.yellow);

          // Orbiting debris
          for(let i=0; i<4; i++) {
             const angle = this.age * 0.2 + (i * Math.PI * 2 / 4);
             const dist = r * 1.8;
             pxRect(Math.cos(angle)*dist, Math.sin(angle)*dist, 6, 6, '#554411');
          }
          ctx.restore();
        }
      }

      /** Check collision with a defender's hurtbox */
      checkHit(defender) {
        if (!this.alive) return;
        if (this.hitCooldown && this.hitCooldown > 0) {
          this.hitCooldown--;
          return;
        }

        const hurtbox = defender.hurtbox;
        if (!rectsOverlap(this.hitbox, hurtbox)) return;

        // HIT!
        if (!this.isTornado) {
          this.hit = true;
          this.alive = false;
        } else {
          this.hitCooldown = 15; // Hits every 15 frames
        }

        const knockDir = (this.vx > 0) ? 1 : -1;
        const dmg = defender.takeHit(this.damage, knockDir, this.knockback, this.hitstun);

        playSFX('hit');

        // Combo on owner
        this.owner.comboCount++;
        this.owner.comboTimer = 60;
        
        // Mana gain for owner
        this.owner.mana = Math.min(MAX_MANA, this.owner.mana + 15);
        defender.mana = Math.min(MAX_MANA, defender.mana + 2);

        // Big impact FX
        const hx = this.x, hy = this.y;
        spawnSpecialFX(hx, hy, this.color, 35);
        triggerShake(10, 16);
        game.hitFlashTimer = 6;

        game.damageNumbers.push({
          x: hx, y: hy - 10, value: dmg, life: 45, vy: -2, color: this.color
        });
      }
    }

    let projectiles = [];

    // ── Fighter Class ─────────────────────────────────────────
    class Fighter {
      constructor(charDef, startX, facingDir, isAI = false) {
        this.def      = charDef;
        this.name     = charDef.name;
        this.colors   = charDef.colors;
        this.stats    = { ...charDef.stats };
        this.isAI     = isAI;

        // Position & physics
        this.x        = startX;
        this.y        = GROUND_Y;
        this.vx       = 0;
        this.vy       = 0;
        this.facing   = facingDir;  // 1 = right, -1 = left
        this.onGround = true;

        // Health & rounds
        this.health    = MAX_HEALTH;
        this.roundsWon = 0;

        // Combat state
        this.state       = 'idle';  // idle | walking | jumping | crouching | attacking | hit | ko
        this.attackType  = null;    // 'lightPunch' | 'heavyKick' | 'special'
        this.attackFrame = 0;
        this.attackData  = null;
        this.hitRegistered = false; // prevent multi-hit per swing
        this.hitstunTimer  = 0;
        this.mana          = 0; // Starts at 0, max MAX_MANA

        // Animation
        this.animFrame = 0;
        this.walkCycle = 0;

        // Combo tracking
        this.comboCount = 0;
        this.comboTimer = 0;

        // AI internals
        this.aiTimer     = 0;
        this.aiAction    = null;
        this.aiDecisionCd = 0;
      }

      /** The rectangular hurtbox (body collision area) — widened and heightened for 240px tall sprites */
      get hurtbox() {
        const w = 55, h = (this.state === 'crouching') ? 130 : 200;
        return {
          x: this.x - w / 2,
          y: this.y - h,
          w: w,
          h: h
        };
      }

      /** The rectangular hitbox for MELEE attacks (punch/kick only — specials/ultimates use projectiles or screen effects) */
      get hitbox() {
        if (this.state !== 'attacking' || !this.attackData) return null;
        if (this.attackType === 'special' || this.attackType === 'ultimate') return null;
        const atk = this.attackData;
        // Check if we're in the active window
        if (this.attackFrame < atk.startup || this.attackFrame >= atk.startup + atk.active) return null;

        const range = atk.range;
        const hbW = range + 10;
        const hbH = (this.attackType === 'heavyKick') ? 60 : 40;
        const hbX = (this.facing === 1) ? this.x + 20 : this.x - 20 - hbW;
        const hbY = (this.attackType === 'heavyKick') ? this.y - 120 : this.y - 150;

        return { x: hbX, y: hbY, w: hbW, h: hbH };
      }

      /** Start an attack */
      startAttack(type) {
        if (this.state === 'attacking' || this.state === 'hit' || this.state === 'ko') return;
        if (type === 'special' && this.mana < 50) return;
        if (type === 'lightProjectile' && this.mana < 15) return;
        if (type === 'ultimate' && this.mana < 100) return;
        if (!this.onGround && type === 'heavyKick') return; // no air heavy kicks

        this.state = 'attacking';
        this.attackType = type;
        this.attackFrame = 0;
        this.hitRegistered = false;

        if (type === 'special') {
          this.mana -= 50;
          this.attackData = {
            ...ATTACKS.special,
            damage: this.def.special.damage,
            range:  this.def.special.range,
            active: Math.round(this.def.special.frames * 0.3),
            recovery: Math.round(this.def.special.frames * 0.4)
          };
          // Spawn a projectile at the throw frame
          this._spawnedProjectile = false;
        } else if (type === 'lightProjectile') {
          this.mana -= 15;
          this.attackData = {
            ...ATTACKS.lightPunch,
            damage: ATTACKS.lightPunch.damage,
            startup: 12,
            active: 10,
            recovery: 20
          };
          this._spawnedLightProjectile = false;
          playSFX('special', this.def.special.element); // smaller whoosh
        } else if (type === 'ultimate') {
          this.mana -= 100;
          this.attackData = {
            damage: this.def.special.damage * 2.5, // much higher damage
            startup: 20, // long windup
            active: 30, // active effect duration
            recovery: 40 // long recovery
          };
          this._spawnedUltimate = false;
          playSFX('special', this.def.special.element); // Play initial sound
        } else {
          this.attackData = { ...ATTACKS[type] };
          // Play punch or kick SFX
          playSFX(type === 'lightPunch' ? 'punch' : 'kick');
        }
        // Apply power stat
        this.attackData.damage = Math.round(this.attackData.damage * this.stats.power);
      }

      /** Take damage from an attack */
      takeHit(damage, knockbackDir, knockbackForce, hitstun) {
        // Apply defense
        const actualDmg = Math.max(1, Math.round(damage / this.stats.defense));
        this.health = Math.max(0, this.health - actualDmg);
        this.state = 'hit';
        this.hitstunTimer = hitstun;
        this.vx = knockbackDir * knockbackForce;
        this.vy = -3;
        this.attackType = null;
        this.attackData = null;

        if (this.health <= 0) {
          this.state = 'ko';
          this.vx = knockbackDir * knockbackForce * 1.5;
          this.vy = -6;
          playSFX('ko');
        }

        return actualDmg;
      }

      /** Per-frame physics & state update */
      update() {
        this.animFrame++;

        // ── Gravity ──
        if (!this.onGround) {
          this.vy += GRAVITY;
        }

        // ── Apply velocity ──
        this.x += this.vx;
        this.y += this.vy;

        // ── Ground collision ──
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.vy = 0;
          this.onGround = true;
        } else {
          this.onGround = false;
        }

        // ── Wall bounds ──
        this.x = clamp(this.x, 30, W - 30);

        // ── Friction ──
        if (this.onGround && this.state !== 'walking') {
          this.vx *= FRICTION;
        }

        // ── Combos ──
        if (this.comboTimer > 0) {
          this.comboTimer--;
          if (this.comboTimer <= 0) this.comboCount = 0;
        }

        // ── State machine ──
        switch (this.state) {
          case 'charging':
            this.mana = Math.min(MAX_MANA, this.mana + 1); // 60 mana per sec
            break;

          case 'hit':
            this.hitstunTimer--;
            this.vx *= 0.9;
            if (this.hitstunTimer <= 0) {
              this.state = 'idle';
            }
            break;

          case 'attacking':
            this.attackFrame++;
            const totalFrames = this.attackData.startup + this.attackData.active + this.attackData.recovery;
            // Spawn projectile at the right moment (end of startup)
            if (this.attackType === 'special' && !this._spawnedProjectile &&
                this.attackFrame >= this.attackData.startup) {
              this._spawnedProjectile = true;
              // Find the opponent to target
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              projectiles.push(new Projectile(this, opponent));
            }

            // Spawn light projectile
            if (this.attackType === 'lightProjectile' && !this._spawnedLightProjectile &&
                this.attackFrame >= this.attackData.startup) {
              this._spawnedLightProjectile = true;
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              const p = new Projectile(this, opponent);
              p.isLight = true;
              p.damage = this.attackData.damage;
              p.radius = p.radius / 2; // smaller
              p.vx = this.facing * 12; // faster
              projectiles.push(p);
            }

            // Spawn Ultimate effect at end of startup
            if (this.attackType === 'ultimate' && !this._spawnedUltimate && 
                this.attackFrame >= this.attackData.startup) {
              this._spawnedUltimate = true;
              const opponent = (game.player1 === this) ? game.player2 : game.player1;
              
              if (this.name === 'HARAN') {
                triggerShake(20, 30);
                const startX = this.x;
                const dir = this.facing;
                
                // Earth wave particles
                particles.push({
                  life: 60, maxLife: 60, get dead() { return this.life <= 0; },
                  update() { this.life--; },
                  draw() {
                    if (this.life <= 0) return;
                    const progress = 1 - (this.life / this.maxLife);
                    const waveMaxDist = 600;
                    
                    // Draw jagged ground spikes erupting up to current wave position
                    ctx.save();
                    for (let sx = 0; sx < progress * waveMaxDist; sx += 40) {
                      const spikeX = startX + (dir * sx);
                      // Skip if offscreen
                      if (spikeX < -100 || spikeX > W + 100) continue;
                      
                      // Spikes get shorter as they get older
                      const age = progress * waveMaxDist - sx; 
                      let h = 90 - (age * 0.18) + Math.sin(sx * 0.5) * 20;
                      if (h < 0) h = 0;

                      ctx.fillStyle = '#4A3515';
                      ctx.beginPath();
                      ctx.moveTo(spikeX - 25, GROUND_Y);
                      ctx.lineTo(spikeX + (dir * 10), GROUND_Y - h);
                      ctx.lineTo(spikeX + 25, GROUND_Y);
                      ctx.fill();
                      
                      ctx.fillStyle = '#8B6914';
                      ctx.beginPath();
                      ctx.moveTo(spikeX - 12, GROUND_Y);
                      ctx.lineTo(spikeX + (dir * 10), GROUND_Y - h);
                      ctx.lineTo(spikeX + 12, GROUND_Y);
                      ctx.fill();
                      
                      // Spawn dust at the leading edge
                      if (Math.abs(sx - (progress * waveMaxDist)) < 50 && Math.random() < 0.4) {
                         spawnSpecialFX(spikeX, GROUND_Y, '#CD853F', 3);
                      }
                    }
                    ctx.restore();
                  }
                });

                // Progressive hit check using a proxy projectile
                const p = new Projectile(this, opponent);
                p.vx = this.facing * 10;
                p.radius = 40;
                p.element = 'none'; // Invisible, purely for collision
                p.damage = this.attackData.damage;
                p.isTornado = false;
                p.color = 'transparent';
                p.draw = () => {}; // Invisible
                p.ageLimit = 60;
                p.update = function() {
                  this.x += this.vx;
                  this.y = GROUND_Y - 20; // Rides along ground
                  this.age++;
                  if (this.age > this.ageLimit) this.alive = false;
                };
                projectiles.push(p);
              } else if (this.name === 'OMKAR') {
                triggerShake(8, 20);
                // Spawns multiple projectiles rapidly
                for (let i = 0; i < 5; i++) {
                   setTimeout(() => {
                     const p = new Projectile(this, opponent);
                     p.vy = rand(-2, 2); // spray
                     p.vx = this.facing * rand(6, 10);
                     p.knockback = 5;
                     p.damage = Math.round(this.attackData.damage / 4); // Spread damage
                     p.ageLimit = randInt(25, 40); // Limited range for ultra
                     projectiles.push(p);
                   }, i * 100);
                }
              } else if (this.name === 'PRANAV') {
                triggerShake(15, 30);
                // Vertical strike exactly at opponent's location
                const strikeX = opponent.x;
                
                // Broad violet lightning strike visual
                particles.push({
                  x: strikeX, y: 0, 
                  life: 30, maxLife: 30, get dead() { return this.life <= 0; },
                  update() { this.life--; },
                  draw() {
                     if (this.life <= 0) return;
                     const alpha = Math.min(1, this.life / 10);
                     
                     ctx.save();
                     ctx.globalAlpha = alpha;
                     ctx.shadowBlur = 20 + rand(0, 10);
                     ctx.shadowColor = '#8A2BE2';
                     
                     // Draw 3 jagged bolts
                     for (let b = 0; b < 3; b++) {
                         ctx.beginPath();
                         ctx.moveTo(this.x + rand(-30, 30), 0);
                         let currY = 0;
                         let currX = this.x;
                         
                         while (currY < GROUND_Y) {
                             currX += rand(-40, 40);
                             currY += rand(40, 90);
                             ctx.lineTo(currX, currY);
                         }
                         
                         ctx.lineWidth = (b === 0) ? rand(8, 12) : rand(2, 5); // Main bolt is thicker
                         ctx.strokeStyle = (b === 0) ? '#FFFFFF' : ((b === 1) ? '#E0B0FF' : '#8A2BE2');
                         ctx.stroke();
                     }

                     // Impact flash on ground
                     ctx.globalAlpha = alpha * 0.8;
                     ctx.beginPath();
                     ctx.ellipse(this.x, GROUND_Y, 90 + rand(-15, 15), 20 + rand(-5, 5), 0, 0, Math.PI * 2);
                     ctx.fillStyle = '#E0B0FF';
                     ctx.fill();

                     ctx.restore();
                  }
                });

                if (Math.abs(opponent.x - strikeX) < 60 && opponent.state !== 'ko') {
                  opponent.takeHit(this.attackData.damage, this.facing, 8, 40);
                  opponent.mana = Math.min(MAX_MANA, opponent.mana + 5);
                }
              } else if (this.name === 'ESWAR') {
                 // Spawns a slow, multi-hitting tornado projectile
                 const p = new Projectile(this, opponent);
                 p.vx = this.facing * 3; // Slow
                 p.radius = 24; // Big
                 p.isTornado = true;
                 p.hit = false; // Never disappears on single hit
                 p.damage = Math.round(this.attackData.damage / 5); // Nerfed from /3
                 projectiles.push(p);
              }
            }

            if (this.attackFrame >= totalFrames) {
              this.state = 'idle';
              this.attackType = null;
              this.attackData = null;
            }
            break;

          case 'ko':
            this.vx *= 0.92;
            break;
        }

        // ── Walk cycle ──
        if (this.state === 'walking') {
          this.walkCycle += 0.15;
        }
      }

      /** Get the current pose string for rendering */
      get pose() {
        if (this.state === 'charging') return 'crouch';
        if (this.state === 'ko') return 'ko';
        if (this.state === 'hit') return 'hit';
        if (this.state === 'crouching') return 'crouch';
        if (this.state === 'attacking') {
          if (this.attackType === 'lightPunch') return 'lightPunch';
          if (this.attackType === 'heavyKick')  return 'heavyKick';
          if (this.attackType === 'special' || this.attackType === 'ultimate' || this.attackType === 'lightProjectile') return 'special';
        }
        if (!this.onGround) return 'jump';
        if (this.state === 'walking') return (Math.sin(this.walkCycle) > 0) ? 'walk1' : 'walk2';
        return 'idle';
      }

      draw() {
        // Pass name for specialized rendering
        const currentFrame = (this.state === 'attacking') ? this.attackFrame : this.animFrame;
        drawCharacter(this.x, this.y, this.name, this.facing, this.pose, currentFrame);

        // ── Charging aura when winding up special (before projectile launches) ──
        if (this.state === 'attacking' && (this.attackType === 'special' || this.attackType === 'lightProjectile') && !this._spawnedProjectile && !this._spawnedLightProjectile) {
          const progress = this.attackFrame / this.attackData.startup;
          const spColor = this.def.special.color;
          ctx.globalAlpha = 0.3 + progress * 0.4;
          const glowR = (this.attackType === 'lightProjectile') ? (10 + progress * 20) : (20 + progress * 40);
          const gx = this.x + this.facing * 30;
          const gy = this.y - 150;
          pxRect(gx - glowR / 2, gy - glowR / 2, glowR, glowR, spColor);
          pxRect(gx - glowR / 4, gy - glowR / 4, glowR / 2, glowR / 2, PAL.white);
          ctx.globalAlpha = 1;
          // Charging particles
          if (this.animFrame % 3 === 0) {
            spawnHitSparks(gx, gy, spColor, 2);
          }
        }
        
        // ── Mana charging aura ──
        if (this.state === 'charging') {
          const charColor = this.def.special.color;
          const auraR = 55 + Math.sin(this.animFrame * 0.4) * 10;
          ctx.save();
          ctx.translate(this.x, this.y - 60);
          ctx.rotate(this.animFrame * 0.1);
          
          // Add glow effect
          ctx.shadowColor = charColor;
          ctx.shadowBlur = 20 + Math.sin(this.animFrame * 0.3) * 10;

          // Outer jagged octagon
          ctx.globalAlpha = 0.4 + Math.sin(this.animFrame * 0.2) * 0.2;
          ctx.fillStyle = charColor;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
             const angle = (i / 8) * Math.PI * 2;
             const dist = auraR + (i % 2 === 0 ? 15 : -10) + Math.sin(this.animFrame * 0.5 + i) * 5;
             ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();
          
          // Inner core octagon
          ctx.globalAlpha = 0.8;
          ctx.shadowColor = this.colors.accent || charColor;
          ctx.shadowBlur = 15;
          ctx.fillStyle = this.colors.accent || charColor; 
          ctx.rotate(-this.animFrame * 0.2); // counter-rotate
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
             const angle = (i / 8) * Math.PI * 2;
             const dist = (auraR * 0.6) + (i % 2 === 0 ? 10 : -5);
             ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
          }
          ctx.closePath();
          ctx.fill();
          
          // Reset shadow so it doesn't affect other drawing
          ctx.shadowBlur = 0;
          ctx.restore();
          
          // Upward flowing energy particles
          if (this.animFrame % 2 === 0) {
             particles.push(new Particle(
                this.x + rand(-30, 30),
                this.y - 10 + rand(-10, 10),
                rand(-1, 1),
                rand(-6, -2), // move straight up quickly
                charColor,
                randInt(15, 30),
                randInt(2, 5)
             ));
             if (Math.random() > 0.5) {
                 spawnHitSparks(this.x + rand(-30, 30), this.y - rand(10, 100), this.colors.accent, 1);
             }
          }
        }
      }
    }

    // ── AI Controller ─────────────────────────────────────────
    function updateAI(ai, player) {
      if (ai.state === 'ko' || ai.state === 'hit') return;

      ai.aiDecisionCd--;
      if (ai.aiDecisionCd > 0) return;
      ai.aiDecisionCd = Math.round(AI_REACT_MS / 16.67) + randInt(-2, 4); // Vary reaction

      const dist = Math.abs(ai.x - player.x);
      const facingPlayer = (player.x > ai.x) ? 1 : -1;
      ai.facing = facingPlayer;

      // ── Decision tree ──
      if (player.state === 'ko') {
        // Player is KO'd, just idle
        ai.state = 'idle';
        return;
      }

      if (ai.state === 'charging') {
        if (dist < 150) {
          ai.state = 'idle'; // Stop charging if player gets close
        } else if (ai.mana >= 100 || Math.random() < 0.05) {
          ai.state = 'idle'; // Stop charging if full or randomly
        } else {
          return; // Continue charging
        }
      }

      // ── Dodge incoming projectiles ──
      const incoming = projectiles.find(p => p.owner !== ai && Math.abs(p.x - ai.x) < 280 && Math.abs(p.y - ai.y) < 100);
      if (incoming && ai.onGround && Math.random() < 0.98) { // 98% chance to attempt dodge
        ai.vy = ai.stats.jumpForce * 1.15; // Jump slightly higher to clear large projectiles like tornado
        ai.onGround = false;
        ai.state = 'jumping';
        // Jump forward over the projectile to close the distance
        ai.vx = facingPlayer * ai.stats.speed;
        return;
      }

      if (ai.health < 50 && ai.mana >= 100) {
        // Desperation ultimate
        ai.startAttack('ultimate');
        return;
      }

      if (dist < 60) {
        // Very close — attack! Prioritize mana usage.
        if (ai.mana >= 100 && Math.random() < 0.8) {
          ai.startAttack('ultimate');
        } else if (ai.mana >= 50 && Math.random() < 0.7) {
          ai.startAttack('special');
        } else {
          const r = Math.random();
          if (r < 0.5) {
            ai.startAttack('lightPunch');
          } else if (r < 0.9) {
            ai.startAttack('heavyKick');
          } else {
            // Dodge back
            ai.vx = -facingPlayer * 5;
            ai.state = 'idle';
          }
        }
      } else if (dist < 140) {
        // Medium range — approach or attack
        if (ai.mana >= 100 && Math.random() < 0.6) {
          ai.startAttack('ultimate');
        } else if (ai.mana >= 50 && Math.random() < 0.5) {
          ai.startAttack('special');
        } else if (Math.random() < 0.4 && ai.state !== 'attacking') {
          ai.vx = facingPlayer * ai.stats.speed * 1.2;
          ai.state = 'walking';
        } else {
          ai.startAttack('heavyKick');
        }
      } else if (dist < 250) {
        // Far — approach or charge
        if (ai.mana < 100 && Math.random() < 0.3) {
          ai.state = 'charging';
          ai.vx = 0;
        } else if (Math.random() < 0.7) {
          ai.vx = facingPlayer * ai.stats.speed;
          ai.state = 'walking';
        } else if (Math.random() < 0.3 && ai.onGround) {
          // Jump approach
          ai.vy = ai.stats.jumpForce;
          ai.onGround = false;
          ai.state = 'jumping';
          ai.vx = facingPlayer * ai.stats.speed * 0.8;
        }
      } else {
        // Very far — dash in or charge
        if (ai.mana < 100 && Math.random() < 0.5) {
          ai.state = 'charging';
          ai.vx = 0;
        } else {
          ai.vx = facingPlayer * ai.stats.speed * 1.2;
          ai.state = 'walking';
          if (Math.random() < 0.2 && ai.onGround) {
            ai.vy = ai.stats.jumpForce;
            ai.onGround = false;
          }
        }
      }
    }

    // ── Player Input Handler ──────────────────────────────────
    function handlePlayerInput(player) {
      if (player.state === 'ko' || player.state === 'hit' || player.state === 'attacking') return;

      let moving = false;

      // Movement
      if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx = -player.stats.speed;
        player.state = 'walking';
        moving = true;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx = player.stats.speed;
        player.state = 'walking';
        moving = true;
      }

      // Crouch
      if (keys['ArrowDown'] || keys['KeyS']) {
        player.state = 'crouching';
        player.vx *= 0.5;
        moving = true;
      }

      // Jump
      if ((keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
        player.vy = player.stats.jumpForce;
        player.onGround = false;
        player.state = 'jumping';
      }

      // Attacks
      if (keys['KeyJ'] || keys['KeyZ']) {
        player.startAttack('lightPunch');
      }
      if (keys['KeyK'] || keys['KeyX']) {
        player.startAttack('heavyKick');
      }
      if (keys['KeyI'] || keys['KeyC']) {
        player.startAttack('special');
      }
      if (keys['KeyO'] || keys['KeyP']) {
        player.startAttack('lightProjectile');
      }
      if (keys['KeyL'] || keys['KeyV']) {
        player.startAttack('ultimate');
      }
      
      // Charging
      if ((keys['KeyE'] || keys['KeyU']) && player.onGround && player.state !== 'attacking') {
        player.state = 'charging';
        player.vx = 0;
        moving = true;
      }

      if (!moving && player.onGround && player.state !== 'attacking') {
        player.state = 'idle';
      }
    }

    // ── Collision / Hit Detection ─────────────────────────────
    function checkHitDetection(attacker, defender) {
      if (attacker.state !== 'attacking' || attacker.hitRegistered) return;

      const hitbox = attacker.hitbox;
      if (!hitbox) return;

      const hurtbox = defender.hurtbox;
      if (!rectsOverlap(hitbox, hurtbox)) return;

      // HIT CONFIRMED!
      attacker.hitRegistered = true;
      const knockDir = (attacker.x < defender.x) ? 1 : -1;
      const dmg = defender.takeHit(
        attacker.attackData.damage,
        knockDir,
        attacker.attackData.knockback,
        attacker.attackData.hitstun
      );

      // Play impact sound
      playSFX('hit');

      // Combo tracking
      attacker.comboCount++;
      attacker.comboTimer = 60;
      
      // Mana gain (reduced)
      attacker.mana = Math.min(MAX_MANA, attacker.mana + (attacker.attackType === 'heavyKick' ? 6 : 4));
      defender.mana = Math.min(MAX_MANA, defender.mana + 1);

      // Visual feedback
      const hitX = (hitbox.x + hitbox.w / 2 + hurtbox.x + hurtbox.w / 2) / 2;
      const hitY = (hitbox.y + hitbox.h / 2 + hurtbox.y + hurtbox.h / 2) / 2;

      if (attacker.attackType === 'special') {
        spawnSpecialFX(hitX, hitY, attacker.def.special.color, 30);
        triggerShake(8, 14);
        game.hitFlashTimer = 6;
      } else if (attacker.attackType === 'heavyKick') {
        spawnHitSparks(hitX, hitY, PAL.yellow, 15);
        triggerShake(5, 8);
        game.hitFlashTimer = 4;
      } else {
        spawnHitSparks(hitX, hitY, PAL.white, 8);
        triggerShake(2, 4);
        game.hitFlashTimer = 2;
      }

      // Damage number
      game.damageNumbers.push({
        x: hitX, y: hitY - 10,
        value: dmg,
        life: 40,
        vy: -2,
        color: (attacker.attackType === 'special') ? attacker.def.special.color : PAL.yellow
      });
    }

    // ── Background Renderer (Medieval City Daytime) ───────────
    function drawBackground() {
      const bgImg = processedSprites['BG'];
      if (bgImg) {
        // Simple scaling to fill the game viewport
        ctx.drawImage(bgImg, 0, 0, W, H);
      } else {
        // Fallback loading color
        pxRect(0, 0, W, H, '#87CEEB'); 
      }
    }

    // ── HUD Renderer ──────────────────────────────────────────
    function drawHUD(p1, p2) {
      const barW = Math.min(W * 0.35, 400); // Scale with screen
      const barH = 24;
      const barY = 30;

      // P1 health bar (left side)
      pxRect(20, barY, barW + 4, barH + 4, PAL.darkGray);
      pxRect(22, barY + 2, barW, barH, '#1a0000');
      const p1w = (p1.health / MAX_HEALTH) * barW;
      const p1Color = p1.health > 30 ? PAL.green : PAL.red;
      pxRect(22, barY + 2, p1w, barH, p1Color);
      // Shine
      pxRect(22, barY + 2, p1w, 6, p1.health > 30 ? '#66ee66' : '#ff6666');

      // P2 health bar (right side, fills from right)
      pxRect(W - 24 - barW, barY, barW + 4, barH + 4, PAL.darkGray);
      pxRect(W - 22 - barW, barY + 2, barW, barH, '#1a0000');
      const p2w = (p2.health / MAX_HEALTH) * barW;
      const p2Color = p2.health > 30 ? PAL.green : PAL.red;
      pxRect(W - 22 - barW + (barW - p2w), barY + 2, p2w, barH, p2Color);
      pxRect(W - 22 - barW + (barW - p2w), barY + 2, p2w, 6, p2.health > 30 ? '#66ee66' : '#ff6666');

      // Names (with thick black shadow for readability against sky)
      pxText(p1.name, 26, barY - 16, 14, '#000000');
      pxText(p2.name, W - 22, barY - 16, 14, '#000000', 'right');
      pxText(p1.name, 24, barY - 18, 14, p1.colors.accent);
      pxText(p2.name, W - 24, barY - 18, 14, p2.colors.accent, 'right');

      // Round indicators
      for (let i = 0; i < ROUND_WIN; i++) {
        const rc1 = i < p1.roundsWon ? PAL.yellow : PAL.darkGray;
        const rc2 = i < p2.roundsWon ? PAL.yellow : PAL.darkGray;
        pxRect(24 + i * 20, barY + barH + 10, 14, 14, rc1);
        pxRect(W - 38 - i * 20, barY + barH + 10, 14, 14, rc2);
      }

      // VS / Timer area
      pxText('VS', W / 2, barY, 18, PAL.yellow, 'center');

      // Round timer
      const timeLeft = Math.max(0, Math.ceil(game.roundTimer / 60));
      pxText(String(timeLeft), W / 2, barY + 26, 24, PAL.white, 'center');

      // Debug
      pxText(`DEBUG STATE: ${p1.state} | POSE: ${p1.pose} | HITIMG_LOADED: ${!!processedSprites['HARAN_HIT_1']}`, 24, barY + barH + 30, 10, PAL.white);

      // Combo display
      if (p1.comboCount >= 2) {
        pxText(`${p1.comboCount} COMBO!`, 24, barY + barH + 34, 10, PAL.orange);
      }
      if (p2.comboCount >= 2) {
        pxText(`${p2.comboCount} COMBO!`, W - 24, barY + barH + 34, 10, PAL.orange, 'right');
      }

      // Mana Visual Bars
      const manaW = Math.min(barW * 0.5, 200);
      const manaH = 10;
      
      // P1 Mana
      const p1ManaPct = p1.mana / MAX_MANA;
      pxRect(24, barY + barH + 50, manaW, manaH, PAL.darkGray);
      pxRect(24, barY + barH + 50, manaW * p1ManaPct, manaH, '#2266cc');
      
      if (p1.mana >= 100) {
        pxText('ULTIMATE READY [L]', 24, barY + barH + 46, 8, PAL.yellow);
      } else if (p1.mana >= 50) {
        pxText('SPECIAL READY [I]', 24, barY + barH + 46, 8, PAL.cyan);
      } else {
        pxText('MANA', 24, barY + barH + 46, 8, PAL.gray);
      }

      // P2 Mana
      const p2ManaPct = p2.mana / MAX_MANA;
      pxRect(W - 24 - manaW, barY + barH + 50, manaW, manaH, PAL.darkGray);
      pxRect(W - 24 - manaW + (manaW - manaW * p2ManaPct), barY + barH + 50, manaW * p2ManaPct, manaH, '#2266cc');

      if (p2.mana >= 100) {
        pxText('ULTIMATE READY', W - 24, barY + barH + 46, 8, PAL.yellow, 'right');
      } else if (p2.mana >= 50) {
        pxText('SPECIAL READY', W - 24, barY + barH + 46, 8, PAL.cyan, 'right');
      } else {
        pxText('MANA', W - 24, barY + barH + 46, 8, PAL.gray, 'right');
      }

      // Controls hint
      pxText('MOVE: WASD/Arrows  PUNCH: J  KICK: K  SPECIAL: I  ULTIMATE: L', W / 2, H - 20, 10, '#444466', 'center');

    }

    // ── Title Screen Renderer ─────────────────────────────────
    function drawTitleScreen() {
      // Background
      pxRect(0, 0, W, H, '#08081a');

      // Animated background grid OR image
      const titleBgImg = processedSprites['TITLE_BG'];
      if (titleBgImg) {
        ctx.drawImage(titleBgImg, 0, 0, W, H);
        // Dimming overlay so text remains readable
        ctx.globalAlpha = 0.5;
        pxRect(0, 0, W, H, '#000000');
        ctx.globalAlpha = 1;
      } else {
        const t = game.globalFrame * 0.5;
        ctx.globalAlpha = 0.06;
        for (let gy = -32; gy < H + 32; gy += 32) {
          for (let gx = -32; gx < W + 32; gx += 32) {
            const ox = Math.sin((gx + t) * 0.01) * 4;
            const oy = Math.cos((gy + t) * 0.012) * 4;
            pxRect(gx + ox, gy + oy, 28, 28, PAL.purple);
          }
        }
        ctx.globalAlpha = 1;
      }

      // Title text with glow
      const titleY = H / 2 - 70 + Math.sin(game.globalFrame * 0.04) * 6;

      // Shadow
      pxText('HOPE', W / 2 + 2, titleY + 2, 48, '#220044', 'center');
      pxText('BRAWLERS', W / 2 + 2, titleY + 58, 48, '#220044', 'center');
      // Main
      pxText('HOPE', W / 2, titleY, 48, PAL.red, 'center');
      pxText('BRAWLERS', W / 2, titleY + 56, 48, PAL.cyan, 'center');

      // Subtitle
      pxText('RETRO FIGHTER', W / 2, titleY + 115, 12, PAL.yellow, 'center');

      // Flashing "Press Enter"
      if (Math.sin(game.globalFrame * 0.08) > 0) {
        pxText('PRESS ENTER TO START', W / 2, H - 80, 11, PAL.white, 'center');
      }

      // Credits
      pxText('A HOPE PRODUCTION', W / 2 + 1, H - 29, 10, '#000000', 'center');
      pxText('A HOPE PRODUCTION', W / 2, H - 30, 10, PAL.white, 'center');
    }

    // ── Character Select Screen ───────────────────────────────
    function drawSelectScreen() {
      pxRect(0, 0, W, H, '#0a0a1e');

      // Title
      pxText('CHOOSE YOUR FIGHTER', W / 2, 24, 14, PAL.yellow, 'center');

      // Character cards
      const cardW = 250;
      const cardH = 430;
      const startX = (W - (cardW * 4 + 30 * 3)) / 2;
      const cardY  = 55;

      for (let i = 0; i < 4; i++) {
        const ch = CHAR_DEFS[i];
        const cx = startX + i * (cardW + 30);
        const cy = cardY;

        // Hover detection
        const hovered = mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH;

        // Card background
        const bgColor = hovered ? '#1a1a3a' : '#0f0f24';
        pxRect(cx, cy, cardW, cardH, bgColor);
        pxRect(cx, cy, cardW, 3, ch.colors.primary);
        pxRect(cx, cy + cardH - 3, cardW, 3, ch.colors.primary);
        pxRect(cx, cy, 3, cardH, ch.colors.primary);
        pxRect(cx + cardW - 3, cy, 3, cardH, ch.colors.primary);

        // Hover glow
        if (hovered) {
          ctx.globalAlpha = 0.12 + Math.sin(game.globalFrame * 0.1) * 0.06;
          pxRect(cx, cy, cardW, cardH, ch.colors.primary);
          ctx.globalAlpha = 1;

          // Selection border
          pxRect(cx - 2, cy - 2, cardW + 4, cardH + 4, ch.colors.accent);
          pxRect(cx, cy, cardW, cardH, bgColor);
          pxRect(cx, cy, cardW, 3, ch.colors.primary);
          pxRect(cx, cy + cardH - 3, cardW, 3, ch.colors.primary);
          pxRect(cx, cy, 3, cardH, ch.colors.primary);
          pxRect(cx + cardW - 3, cy, 3, cardH, ch.colors.primary);
        }

        // Character preview sprite
        const spriteX = cx + cardW / 2;
        const spriteY = cy + 220;
        drawCharacter(spriteX, spriteY, ch.name, 1,
          hovered ? ((Math.sin(game.globalFrame * 0.08) > 0) ? 'walk1' : 'walk2') : 'idle',
          game.globalFrame
        );

        // Name
        pxText(ch.name, cx + cardW / 2, cy + 245, 18, ch.colors.primary, 'center');

        // Title
        pxText(ch.title, cx + cardW / 2, cy + 275, 11, ch.colors.accent, 'center');

        // Stats bars
        const statsY = cy + 305;
        const statW  = cardW - 30;
        const stats = [
          { label: 'SPD', val: ch.stats.speed / 4, col: PAL.cyan },
          { label: 'POW', val: ch.stats.power / 1.6, col: PAL.red },
          { label: 'DEF', val: ch.stats.defense / 1.6, col: PAL.green }
        ];
        stats.forEach((st, si) => {
          const sy = statsY + si * 24;
          pxText(st.label, cx + 15, sy, 8, PAL.gray);
          pxRect(cx + 46, sy + 1, statW - 40, 10, '#1a1a1a');
          pxRect(cx + 46, sy + 1, (statW - 40) * st.val, 10, st.col);
        });

        // Special move name
        pxText(ch.special.name, cx + cardW / 2, cy + 395, 10, ch.colors.accent, 'center');

        // Click to select
        if (hovered && mouseClicked) {
          game.selectPlayer(i);
        }
      }

      // Instruction
      pxText('CONTROLS: WASD=Move, J=Punch, K=Kick, O=Light, I=Special, L=Ultimate, E=Charge', W / 2, H - 45, 7, '#666688', 'center');
      if (Math.sin(game.globalFrame * 0.06) > -0.3) {
        pxText('CLICK A FIGHTER TO SELECT', W / 2, H - 25, 9, PAL.white, 'center');
      }
    }

    // ── Round End Overlay ─────────────────────────────────────
    function drawRoundEnd(winner) {
      ctx.globalAlpha = 0.55;
      pxRect(0, 0, W, H, '#000000');
      ctx.globalAlpha = 1;

      const txt = winner ? `${winner.name} WINS!` : 'DRAW!';
      const col = winner ? winner.colors.primary : PAL.yellow;

      pxText(txt, W / 2, H / 2 - 30, 22, col, 'center');

      if (game.roundEndTimer < 120) {
        pxText('NEXT ROUND...', W / 2, H / 2 + 20, 10, PAL.gray, 'center');
      }
    }

    function drawMatchEnd(winner) {
      const bgImg = processedSprites['TITLE_BG'];
      if (bgImg) {
        ctx.drawImage(bgImg, 0, 0, W, H);
        ctx.globalAlpha = 0.7;
        pxRect(0, 0, W, H, '#000000');
        ctx.globalAlpha = 1;
      } else {
        ctx.globalAlpha = 0.7;
        pxRect(0, 0, W, H, '#000000');
        ctx.globalAlpha = 1;
      }

      if (winner) {
        pxText(`${winner.name}`, W / 2 + 2, H / 2 - 58, 28, '#000000', 'center');
        pxText(`${winner.name}`, W / 2, H / 2 - 60, 28, winner.colors.primary, 'center');
        pxText('IS THE CHAMPION!', W / 2 + 2, H / 2 - 18, 14, '#000000', 'center');
        pxText('IS THE CHAMPION!', W / 2, H / 2 - 20, 14, PAL.yellow, 'center');

        // Draw winner sprite big (just draw them centered)
        drawCharacter(W / 2, H / 2 + 100, winner.name, 1, 'idle', game.globalFrame);

        // Victory particles
        if (game.globalFrame % 6 === 0) {
          spawnHitSparks(rand(100, W - 100), rand(100, H - 100), winner.colors.accent, 3);
        }
      }

      if (Math.sin(game.globalFrame * 0.07) > 0) {
        pxText('PRESS ENTER TO CONTINUE', W / 2, H - 50, 9, PAL.white, 'center');
      }
    }

    // ── Damage Numbers ────────────────────────────────────────
    function updateAndDrawDamageNumbers() {
      game.damageNumbers = game.damageNumbers.filter(d => {
        d.y += d.vy;
        d.vy -= 0.03;
        d.life--;
        const alpha = clamp(d.life / 20, 0, 1);
        ctx.globalAlpha = alpha;
        pxText(`-${d.value}`, d.x, d.y, 12, d.color, 'center');
        ctx.globalAlpha = 1;
        return d.life > 0;
      });
    }

    // ── Announcement Text (FIGHT! / ROUND X) ─────────────────
    function drawAnnouncement() {
      if (game.announceTimer <= 0) return;
      game.announceTimer--;
      const alpha = clamp(game.announceTimer / 20, 0, 1);
      const scale = 1 + (1 - alpha) * 0.5;
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(W / 2, H / 2 - 40);
      ctx.scale(scale, scale);
      pxText(game.announceText, 0, 0, 28, game.announceColor, 'center');
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ── Game Manager ──────────────────────────────────────────
    const game = {
      state:         STATE.TITLE,
      globalFrame:   0,
      player1:       null,
      player2:       null,
      p1CharIdx:     -1,
      p2CharIdx:     -1,
      roundTimer:    0,
      roundEndTimer: 0,
      matchEndTimer: 0,
      hitFlashTimer: 0,
      damageNumbers: [],
      announceText:  '',
      announceColor: PAL.white,
      announceTimer: 0,
      currentRound:  1,

      announce(text, color = PAL.white) {
        this.announceText  = text;
        this.announceColor = color;
        this.announceTimer = 80;
      },

      selectPlayer(index) {
        this.p1CharIdx = index;
        // AI picks randomly from remaining
        const remaining = [0, 1, 2, 3].filter(i => i !== index);
        this.p2CharIdx = remaining[randInt(0, remaining.length - 1)];
        this.startMatch();
      },

      startMatch() {
        this.state = STATE.FIGHT;
        this.currentRound = 1;
        this.player1 = new Fighter(CHAR_DEFS[this.p1CharIdx], 200, 1, false);
        this.player2 = new Fighter(CHAR_DEFS[this.p2CharIdx], W - 200, -1, true);
        this.roundTimer = 99 * 60; // 99 seconds
        this.announce(`ROUND ${this.currentRound}`, PAL.yellow);
        setTimeout(() => this.announce('FIGHT!', PAL.red), 1400);
      },

      startNewRound() {
        this.player1.x = 200;
        this.player1.y = GROUND_Y;
        this.player1.vx = 0;
        this.player1.vy = 0;
        this.player1.health = MAX_HEALTH;
        this.player1.state = 'idle';
        this.player1.hitstunTimer = 0;
        this.player1.mana = 0;
        this.player1.comboCount = 0;
        this.player1.facing = 1;

        this.player2.x = W - 200;
        this.player2.y = GROUND_Y;
        this.player2.vx = 0;
        this.player2.vy = 0;
        this.player2.health = MAX_HEALTH;
        this.player2.state = 'idle';
        this.player2.hitstunTimer = 0;
        this.player2.mana = 0;
        this.player2.comboCount = 0;
        this.player2.facing = -1;

        this.roundTimer = 99 * 60;
        this.currentRound++;
        this.damageNumbers = [];
        particles = [];
        projectiles = [];

        this.announce(`ROUND ${this.currentRound}`, PAL.yellow);
        setTimeout(() => this.announce('FIGHT!', PAL.red), 1400);
      },

      endRound(winner) {
        this.state = STATE.ROUND_END;
        this.roundEndTimer = 180;
        if (winner) {
          winner.roundsWon++;
        }
        // Check for match end
        if (winner && winner.roundsWon >= ROUND_WIN) {
          setTimeout(() => {
            this.state = STATE.MATCH_END;
            this.matchEndTimer = 0;
          }, 2500);
        }
      },

      update() {
        this.globalFrame++;

        if (this.state === STATE.TITLE) {
          if (keys['Enter'] || keys['Space']) {
            this.state = STATE.SELECT;
            keys['Enter'] = false;
            keys['Space'] = false;
          }
          return;
        }

        if (this.state === STATE.SELECT) {
          // Handled via mouse click in draw
          return;
        }

        if (this.state === STATE.MATCH_END) {
          this.matchEndTimer++;
          if (keys['Enter'] || keys['Space']) {
            this.state = STATE.SELECT;
            this.p1CharIdx = -1;
            this.p2CharIdx = -1;
            keys['Enter'] = false;
            keys['Space'] = false;
          }
          return;
        }

        if (this.state === STATE.ROUND_END) {
          this.roundEndTimer--;
          if (this.roundEndTimer <= 0) {
            this.state = STATE.FIGHT;
            this.startNewRound();
          }
          return;
        }

        // ── FIGHT STATE ──
        const p1 = this.player1;
        const p2 = this.player2;

        // Round timer
        this.roundTimer--;
        if (this.roundTimer <= 0) {
          // Time out — whoever has more health wins the round
          const winner = (p1.health >= p2.health) ? p1 : p2;
          this.endRound(winner);
          return;
        }

        // Auto-face opponent
        if (p1.state !== 'attacking' && p1.state !== 'hit') {
          p1.facing = (p2.x > p1.x) ? 1 : -1;
        }
        if (p2.state !== 'attacking' && p2.state !== 'hit') {
          p2.facing = (p1.x > p2.x) ? 1 : -1;
        }

        // Input
        handlePlayerInput(p1);
        updateAI(p2, p1);

        // Physics
        p1.update();
        p2.update();

        // Push-apart (prevent overlapping)
        const overlap = 30 - Math.abs(p1.x - p2.x);
        if (overlap > 0 && Math.abs(p1.y - p2.y) < 60) {
          const push = overlap / 2 + 0.5;
          if (p1.x < p2.x) {
            p1.x -= push;
            p2.x += push;
          } else {
            p1.x += push;
            p2.x -= push;
          }
        }

        // Hit detection — melee (both directions)
        checkHitDetection(p1, p2);
        checkHitDetection(p2, p1);

        // Hit detection — projectiles
        projectiles.forEach(proj => {
          if (!proj.alive) return;
          proj.update();
          // Check projectile vs. the opponent of the owner
          const defender = (proj.owner === p1) ? p2 : p1;
          proj.checkHit(defender);
        });
        projectiles = projectiles.filter(p => p.alive);

        // KO check
        if (p1.state === 'ko' && p1.onGround) {
          this.endRound(p2);
        }
        if (p2.state === 'ko' && p2.onGround) {
          this.endRound(p1);
        }

        // Hit flash
        if (this.hitFlashTimer > 0) this.hitFlashTimer--;

        // Particles
        particles = particles.filter(p => { p.update(); return !p.dead; });

        // Screen shake
        updateShake();
      },

      draw() {
        ctx.save();

        if (this.state === STATE.TITLE) {
          drawTitleScreen();
          ctx.restore();
          mouseClicked = false;
          return;
        }

        if (this.state === STATE.SELECT) {
          drawSelectScreen();
          ctx.restore();
          mouseClicked = false;
          return;
        }

        // ── Fight / Round End / Match End rendering ──
        // Apply screen shake
        ctx.translate(shakeOffsetX, shakeOffsetY);

        // Hit flash
        if (this.hitFlashTimer > 0 && this.hitFlashTimer % 2 === 0) {
          pxRect(0, 0, W, H, 'rgba(255,255,255,0.15)');
        }

        // Background
        drawBackground();

        // Fighters
        const p1 = this.player1;
        const p2 = this.player2;
        p1.draw();
        p2.draw();

        // Projectiles
        projectiles.forEach(proj => proj.draw());

        // Particles
        particles.forEach(p => p.draw());

        // Damage numbers
        updateAndDrawDamageNumbers();

        // HUD
        drawHUD(p1, p2);

        // Announcements
        drawAnnouncement();

        // Round end overlay
        if (this.state === STATE.ROUND_END) {
          const winner = (p1.health > p2.health) ? p1 : ((p2.health > p1.health) ? p2 : null);
          drawRoundEnd(winner);
        }

        // Match end overlay
        if (this.state === STATE.MATCH_END) {
          const winner = (p1.roundsWon >= ROUND_WIN) ? p1 : p2;
          drawMatchEnd(winner);
        }

        ctx.restore();
        mouseClicked = false;
      }
    };

    // ── Main Game Loop ────────────────────────────────────────
    function gameLoop() {
      // Clear
      ctx.clearRect(0, 0, W, H);
      pxRect(0, 0, W, H, PAL.bg);

      game.update();
      game.draw();

      requestAnimationFrame(gameLoop);
    }

    // ── Start! ────────────────────────────────────────────────
    requestAnimationFrame(gameLoop);

  </script>
